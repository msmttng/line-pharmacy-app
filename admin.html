<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>蝠剰ｨｺ蝗樒ｭ皮ｮ｡逅・/title>
  <style>
    :root { --line-green: #06C755; --bg-color: #f0f2f5; }
    body { font-family: sans-serif; background: var(--bg-color); padding: 15px; margin: 0; color: #333; }
    .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .header { font-weight: bold; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    .name { font-size: 1.2rem; color: #1a1a1a; }
    .btn { background: var(--line-green); color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }
    .btn:active { opacity: 0.8; transform: scale(0.98); }
    #msg { padding: 15px; text-align: center; color: #666; font-size: 0.9rem; }
    .data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; font-size: 0.85rem; }
    .data-item { border-left: 3px solid #eee; padding-left: 8px; }
    .label { font-size: 0.7rem; color: #888; display: block; }
    .val { font-weight: 600; }
    .alert { color: #ff4d4f; }
  </style>
</head>
<body>
  <div style="max-width: 900px; margin: 0 auto;">
    <h2 style="padding: 10px 0;">蝠剰ｨｺ蝗樒ｭ比ｸ隕ｧ</h2>
    <div id="msg">繝・・繧ｿ繧定ｪｭ縺ｿ霎ｼ繧薙〒縺・∪縺・..  <script>
    let listData = [];

    window.onload = function() {
      google.script.run
        .withSuccessHandler(function(res) {
          const msg = document.getElementById('msg');
          if (res && res.success) {
            listData = res.list;
            msg.innerText = res.list.length + ' 莉ｶ縺ｮ蝗樒ｭ斐′縺ゅｊ縺ｾ縺・;
            render();
          } else {
            msg.innerText = '繧ｨ繝ｩ繝ｼ: ' + (res ? res.error : '荳肴・縺ｪ繧ｨ繝ｩ繝ｼ');
          }
        })
        .withFailureHandler(function(err) {
          document.getElementById('msg').innerText = '騾壻ｿ｡繧ｨ繝ｩ繝ｼ: ' + err.message;
        })
        .getSubmissions();
    };

    function render() {
      const container = document.getElementById('container');
      if (listData.length === 0) {
        container.innerHTML = '<div id="msg">繝・・繧ｿ縺後≠繧翫∪縺帙ｓ縲・/div>';
        return;
      }

      const highlight = (val) => {
        if (!val) return '縺ｪ縺・;
        if (typeof val === 'string' && (val.includes('縺ゅｊ') || val.includes('豈取律') || val.includes('譎ゅ・) || val !== '縺ｪ縺・ && val !== '縺ｪ縺・鬟ｲ縺ｾ縺ｪ縺・ && val !== '' && !val.includes('縺ｪ縺・))) {
           // 縺ｪ縺・莉･螟悶・蜈ｷ菴鍋噪縺ｪ譁・ｭ励′蜈･縺｣縺ｦ縺・ｋ蝣ｴ蜷医・蠑ｷ隱ｿ・郁ｵ､濶ｲ繝ｻ螟ｪ蟄暦ｼ峨↓縺吶ｋ
           return `<span style="color:#ff4d4f; font-weight:bold;">${val}</span>`;
        }
        return val;
      };

      container.innerHTML = listData.map((item, i) => {
        const hasWarning = (
          item['阮ｬ繧｢繝ｬ繝ｫ繧ｮ繝ｼ'] === '縺ゅｊ' || 
          item['鬟溷刀繧｢繝ｬ繝ｫ繧ｮ繝ｼ'] === '縺ゅｊ' || 
          (item['迺ｰ蠅・い繝ｬ繝ｫ繧ｮ繝ｼ'] && item['迺ｰ蠅・い繝ｬ繝ｫ繧ｮ繝ｼ'] !== '縺ｪ縺・ && item['迺ｰ蠅・い繝ｬ繝ｫ繧ｮ繝ｼ'] !== '') ||
          item['蜑ｯ菴懃畑'] === '縺ゅｊ'
        );
        
        return `
          <div class="card" style="${hasWarning ? 'border-left: 6px solid #ff4d4f;' : ''}">
            <div class="header">
              <div class="name">
                ${item['蜷榊燕'] || '蜷榊燕縺ｪ縺・} 讒・                <span style="font-size:0.8rem; color:#666; font-weight:normal; margin-left:10px;">TEL: ${item['髮ｻ隧ｱ逡ｪ蜿ｷ'] || '荳肴・'}</span>
              </div>
              <button class="btn" onclick="copy(${i}, this)">阮ｬ豁ｴ逕ｨ縺ｫ繧ｳ繝斐・</button>
            </div>
            <div style="font-size:0.75rem; color:#888; margin-bottom:15px;">蜿嶺ｿ｡: ${item['譌･譎・] || ''}</div>
            
            <div class="data-grid">
              <div class="data-item">
                <span class="label">蠕檎匱蜩∝､画峩蟶梧悍</span>
                <span class="val" style="color:#06C755;">${item['繧ｸ繧ｧ繝阪Μ繝・け'] || '縺ｪ縺・}</span>
              </div>
              <div class="data-item">
                <span class="label">譌｢蠕豁ｴ</span>
                <span class="val">${highlight(item['譌｢蠕豁ｴ'])}</span>
                ${item['譌｢蠕豁ｴ隧ｳ邏ｰ'] ? `<div style="font-size:0.75rem; color:#555; margin-top:2px;">(隧ｳ: ${item['譌｢蠕豁ｴ隧ｳ邏ｰ']})</div>` : ''}
              </div>
              <div class="data-item">
                <span class="label">闃ｱ邊臥裸繝ｻ繧｢繝ｬ繝ｫ繧ｲ繝ｳ縺ｫ縺､縺・※</span>
                <span class="val">${highlight(item['迺ｰ蠅・い繝ｬ繝ｫ繧ｮ繝ｼ'])}</span>
              </div>
              <div class="data-item">
                <span class="label">蜑ｯ菴懃畑豁ｴ縲∬脈迚ｩ繧｢繝ｬ繝ｫ繧ｮ繝ｼ</span>
                <span class="val">蜑ｯ菴懃畑:${highlight(item['蜑ｯ菴懃畑'])}<br>阮ｬ迚ｩ繧｢繝ｬ繝ｫ繧ｮ繝ｼ:${highlight(item['阮ｬ繧｢繝ｬ繝ｫ繧ｮ繝ｼ'])}</span>
                ${item['蜑ｯ菴懃畑隧ｳ邏ｰ'] ? `<div style="font-size:0.75rem; color:#555; margin-top:2px;">(蜑ｯ菴懃畑隧ｳ邏ｰ: ${item['蜑ｯ菴懃畑隧ｳ邏ｰ']})</div>` : ''}
                ${item['繧｢繝ｬ繝ｫ繧ｮ繝ｼ隧ｳ邏ｰ'] ? `<div style="font-size:0.75rem; color:#555; margin-top:2px;">(阮ｬ繧｢繝ｬ繝ｫ繧ｮ繝ｼ隧ｳ邏ｰ: ${item['繧｢繝ｬ繝ｫ繧ｮ繝ｼ隧ｳ邏ｰ']})</div>` : ''}
              </div>
              <div class="data-item">
                <span class="label">鬟溽黄遲峨い繝ｬ繝ｫ繧ｮ繝ｼ</span>
                <span class="val">${highlight(item['鬟溷刀繧｢繝ｬ繝ｫ繧ｮ繝ｼ'])}</span>
                ${item['鬟溷刀隧ｳ邏ｰ'] ? `<div style="font-size:0.75rem; color:#555; margin-top:2px;">(鬟溽黄隧ｳ邏ｰ: ${item['鬟溷刀隧ｳ邏ｰ']})</div>` : ''}
              </div>
              <div class="data-item">
                <span class="label">螳壽悄逧・恪逕ｨ阮ｬ繝ｻ繧ｵ繝励Μ繝｡繝ｳ繝医・OTC</span>
                <span class="val">莉夜劼蜃ｦ譁ｹ:${highlight(item['莉夜劼蜃ｦ譁ｹ'])}<br>蟶りｲｩ阮ｬ・･繧ｵ繝励Μ:${highlight(item['蟶りｲｩ阮ｬ'])}</span>
                ${item['莉夜劼隧ｳ邏ｰ'] ? `<div style="font-size:0.75rem; color:#555; margin-top:2px;">(莉夜劼蜃ｦ譁ｹ隧ｳ邏ｰ: ${item['莉夜劼隧ｳ邏ｰ']})</div>` : ''}
                ${item['蟶りｲｩ阮ｬ隧ｳ邏ｰ'] ? `<div style="font-size:0.75rem; color:#555; margin-top:2px;">(蟶りｲｩ阮ｬ隧ｳ邏ｰ: ${item['蟶りｲｩ阮ｬ隧ｳ邏ｰ']})</div>` : ''}
              </div>
              <div class="data-item">
                <span class="label">鬟ｲ鬟溽黄縺ｮ鞫ょ叙迥ｶ豕∫ｭ・/span>
                <span class="val">驟・${highlight(item['驟・])}</span>
              </div>
              <div class="data-item">
                <span class="label">阮ｬ蟄ｦ逧・ｮ｡逅・↓蠢・ｦ√↑謔｣閠・・逕滓ｴｻ蜒・/span>
                <span class="val">驕玖ｻ｢:${highlight(item['驕玖ｻ｢'])}<br>鬮俶園菴懈･ｭ:${highlight(item['鬮俶園'])}<br>蝟ｫ辣・${highlight(item['辣呵拷'])}</span>
              </div>
            </div>
            ${item['蛯呵・] ? `
            <div class="data-item" style="margin-top:10px; border-left: 3px solid #ffca28; background:#fffdf5; padding:8px;">
              <span class="label">迚ｹ險倅ｺ矩・/span>
              <span class="val">${item['蛯呵・]}</span>
            </div>` : ''}
          </div>
        `;
      }).join('');
    }

    function copy(idx, btn) {
      const item = listData[idx];
      let text = "縲仙・蝗槫撫險ｺ蠑慕畑縲曾n";

      const formatVal = (val) => {
        if (!val || val === '縺ｪ縺・縺励↑縺・ || val === '縺ｪ縺・鬟ｲ縺ｾ縺ｪ縺・ || val === 'false') return '縺ｪ縺・;
        return val;
      };
      
      const getDetail = (val, detail) => {
        let v = formatVal(val);
        if (v !== '縺ｪ縺・ && detail) {
            return `${v} (${detail})`;
        }
        return v;
      };

      text += `笆蠕檎匱蜩∝､画峩蟶梧悍: ${formatVal(item['繧ｸ繧ｧ繝阪Μ繝・け'])}\n`;
      text += `笆譌｢蠕豁ｴ: ${getDetail(item['譌｢蠕豁ｴ'], item['譌｢蠕豁ｴ隧ｳ邏ｰ'])}\n`;
      text += `笆闃ｱ邊臥裸繝ｻ繧｢繝ｬ繝ｫ繧ｲ繝ｳ縺ｫ縺､縺・※: ${formatVal(item['迺ｰ蠅・い繝ｬ繝ｫ繧ｮ繝ｼ'])}\n`;
      text += `笆蜑ｯ菴懃畑豁ｴ縲∬脈迚ｩ繧｢繝ｬ繝ｫ繧ｮ繝ｼ: 蜑ｯ菴懃畑:${getDetail(item['蜑ｯ菴懃畑'], item['蜑ｯ菴懃畑隧ｳ邏ｰ'])} / 阮ｬ迚ｩ繧｢繝ｬ繝ｫ繧ｮ繝ｼ:${getDetail(item['阮ｬ繧｢繝ｬ繝ｫ繧ｮ繝ｼ'], item['繧｢繝ｬ繝ｫ繧ｮ繝ｼ隧ｳ邏ｰ'])}\n`;
      text += `笆鬟溽黄遲峨い繝ｬ繝ｫ繧ｮ繝ｼ: ${getDetail(item['鬟溷刀繧｢繝ｬ繝ｫ繧ｮ繝ｼ'], item['鬟溷刀隧ｳ邏ｰ'])}\n`;
      text += `笆螳壽悄逧・恪逕ｨ阮ｬ繝ｻ繧ｵ繝励Μ繝｡繝ｳ繝医・OTC: 莉夜劼蜃ｦ譁ｹ:${getDetail(item['莉夜劼蜃ｦ譁ｹ'], item['莉夜劼隧ｳ邏ｰ'])} / 蟶りｲｩ阮ｬ・･繧ｵ繝励Μ:${getDetail(item['蟶りｲｩ阮ｬ'], item['蟶りｲｩ阮ｬ隧ｳ邏ｰ'])}\n`;
      text += `笆鬟ｲ鬟溽黄縺ｮ鞫ょ叙迥ｶ豕∫ｭ・ 驟・${formatVal(item['驟・])}\n`;
      text += `笆阮ｬ蟄ｦ逧・ｮ｡逅・↓蠢・ｦ√↑謔｣閠・・逕滓ｴｻ蜒・ 驕玖ｻ｢:${formatVal(item['驕玖ｻ｢'])} / 鬮俶園菴懈･ｭ:${formatVal(item['鬮俶園'])} / 蝟ｫ辣・${formatVal(item['辣呵拷'])}\n`;
      if (item['蛯呵・]) {
        text += `笆迚ｹ險倅ｺ矩・ ${item['蛯呵・]}\n`;
      }

      const el = document.createElement('textarea');
      el.value = text; document.body.appendChild(el); el.select();
      document.execCommand('copy'); document.body.removeChild(el);

      const old = btn.innerText;
      btn.innerText = '繧ｳ繝斐・螳御ｺ・ｼ・;
      setTimeout(() => { btn.innerText = old; }, 1500);
    }
  </script>
</body>
</html>
