<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>問診回答管理</title>
  <!-- display=swapでフォントロードがレンダリングをブロックしないよう修正 -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet"></noscript>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --line-green: #06C755;
      --bg-color: #f3f4f6;
      --text-main: #1f2937;
      --text-muted: #9ca3af;
      --border-color: #e5e7eb;
      --danger-bg: #fee2e2;
      --danger-text: #ef4444;
      --warning-bg: #fef3c7;
      --warning-text: #d97706;
      --card-bg: #ffffff;
    }

    /* ===== ログイン画面 ===== */
    #login-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      animation: loginFadeIn 0.4s ease;
    }
    @keyframes loginFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    #login-overlay.fade-out {
      animation: loginFadeOut 0.4s ease forwards;
    }
    @keyframes loginFadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }
    .login-box {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      margin: 0 16px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }
    .login-box h2 {
      color: #ffffff;
      font-size: 1.4rem;
      margin-bottom: 8px;
      text-align: center;
    }
    .login-subtitle {
      color: rgba(255,255,255,0.5);
      font-size: 0.85rem;
      text-align: center;
      margin-bottom: 32px;
    }
    .login-icon {
      text-align: center;
      font-size: 2.5rem;
      margin-bottom: 20px;
    }
    .login-field {
      margin-bottom: 20px;
    }
    .login-field label {
      display: block;
      color: rgba(255,255,255,0.6);
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .login-field input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      background: rgba(255,255,255,0.08);
      color: #ffffff;
      font-size: 1rem;
      font-family: 'Noto Sans JP', sans-serif;
      outline: none;
      transition: all 0.2s ease;
      box-sizing: border-box;
    }
    .login-field input:focus {
      border-color: #06C755;
      background: rgba(255,255,255,0.12);
      box-shadow: 0 0 0 3px rgba(6, 199, 85, 0.15);
    }
    .login-field input::placeholder {
      color: rgba(255,255,255,0.25);
    }
    .login-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #06C755, #05a847);
      color: white;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 8px;
      box-shadow: 0 4px 12px rgba(6, 199, 85, 0.3);
    }
    .login-btn:hover {
      background: linear-gradient(135deg, #05a847, #049a3e);
      box-shadow: 0 6px 16px rgba(6, 199, 85, 0.4);
      transform: translateY(-1px);
    }
    .login-btn:active {
      transform: translateY(0) scale(0.98);
    }
    .login-error {
      color: #ef4444;
      font-size: 0.85rem;
      text-align: center;
      margin-top: 16px;
      min-height: 1.2em;
      font-weight: 500;
      animation: shake 0.4s ease;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg-color);
      padding: 20px;
      margin: 0;
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
    }
    h2 { font-size: 1.5rem; color: #111827; margin-bottom: 1.5rem; text-align: center; }
    .card {
      background: var(--card-bg);
      padding: 24px;
      border-radius: 16px;
      margin-bottom: 24px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
      transition: transform 0.2s, box-shadow 0.2s;
      border: 1px solid #f9fafb;
    }
    .card:hover {
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -2px rgba(0,0,0,0.04);
      transform: translateY(-2px);
    }
    .header {
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 16px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }
    .name { font-size: 1.35rem; font-weight: 700; color: #111827; display: flex; align-items: baseline; gap: 8px;}
    .name-sub { font-size: 0.85rem; color: #6b7280; font-weight: 500; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    
    .btn {
      border: none;
      padding: 10px 18px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn-primary { background: #F47B20; color: white; box-shadow: 0 2px 4px rgba(244, 123, 32, 0.2); }
    .btn-primary:hover { background: #d96918; box-shadow: 0 4px 6px rgba(244, 123, 32, 0.3); }
    .btn-secondary { background: #0066cc; color: white; box-shadow: 0 2px 4px rgba(0, 102, 204, 0.2); }
    .btn-secondary:hover { background: #0052a3; box-shadow: 0 4px 6px rgba(0, 102, 204, 0.3); }
    .btn:active { transform: scale(0.97); }
    .btn-retry { background: #06C755; color: white; padding: 12px 24px; font-size: 1rem; margin-top: 12px; }
    .btn-retry:hover { background: #05a847; }

    #msg { padding: 20px; text-align: center; color: var(--text-muted); font-size: 1.1rem; font-weight: 500; }

    .data-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }
    .data-item {
      background: #fdfdfd;
      border: 1px solid #f3f4f6;
      border-radius: 12px;
      padding: 16px;
      border-left: 4px solid #d1d5db;
    }
    .label {
      font-size: 1.1rem;
      color: #111827;
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
    }
    .val { font-weight: 500; color: var(--text-main); line-height: 1.6; font-size: 0.95rem; }
    
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 10px;
      border-radius: 9999px;
      font-size: 0.85rem;
      font-weight: 700;
      margin: 2px 0;
    }
    .badge-danger { background: var(--danger-bg); color: var(--danger-text); border: 1px solid #fecaca; }
    .badge-warning { background: var(--warning-bg); color: var(--warning-text); border: 1px solid #fde68a; }
    .badge-success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
    .badge-info { background: #dbeafe; color: #1e40af; border: 1px solid #bfdbfe; }
    .text-muted { color: var(--text-muted); font-weight: 400; font-size: 0.9rem; }
    
    .time { font-size: 0.8rem; color: #9ca3af; margin-bottom: 20px; display: inline-flex; align-items: center; gap: 4px; }
    .time::before { content: "🕒"; font-size: 0.85rem; }

    /* ===== スケルトンUI ===== */
    .skeleton-wrap { display: flex; flex-direction: column; gap: 24px; }
    .skeleton-card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
    }
    .skeleton-line {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
      height: 16px;
      margin-bottom: 12px;
    }
    .skeleton-line.wide { width: 60%; }
    .skeleton-line.medium { width: 40%; }
    .skeleton-line.narrow { width: 25%; height: 12px; }
    .skeleton-line.header-line { width: 45%; height: 22px; }
    .skeleton-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; margin-top: 16px; }
    .skeleton-block { background: #f9fafb; border-radius: 12px; padding: 16px; border: 1px solid #f0f0f0; }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    /* ===== ローディング状態バー ===== */
    #loading-status {
      text-align: center;
      padding: 12px;
      font-size: 0.9rem;
      color: #6b7280;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid #e5e7eb;
      border-top-color: #06C755;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== 件数バッジ ===== */
    #count-badge {
      display: inline-block;
      background: #06C755;
      color: white;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 2px 12px;
      border-radius: 999px;
      margin-left: 8px;
      vertical-align: middle;
    }

    /* ===== エラー表示 ===== */
    #error-box {
      display: none;
      background: #fee2e2;
      border: 1px solid #fecaca;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      color: #ef4444;
      margin-bottom: 16px;
    }
    #error-box p { margin: 0 0 8px; font-weight: 600; }

    /* ===== カードフェードイン ===== */
    .card { opacity: 0; transform: translateY(8px); transition: opacity 0.25s ease, transform 0.25s ease; }
    .card.visible { opacity: 1; transform: none; }

    /* ===== 手帳データカード ===== */
    .notebook-section { margin-top: 2rem; }
    .notebook-section h2 { color: #059669; }
    .notebook-card {
      background: var(--card-bg);
      padding: 20px 24px;
      border-radius: 16px;
      margin-bottom: 16px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
      border: 1px solid #f9fafb;
      border-left: 5px solid #06C755;
      opacity: 0; transform: translateY(8px); transition: opacity 0.25s ease, transform 0.25s ease;
    }
    .notebook-card.visible { opacity: 1; transform: none; }
    .notebook-card:hover { box-shadow: 0 10px 15px -3px rgba(0,0,0,0.08); transform: translateY(-2px); opacity: 1; }
    .notebook-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
    .notebook-name { font-size: 1.2rem; font-weight: 700; color: #111827; }
    .notebook-time { font-size: 0.8rem; color: #9ca3af; display: inline-flex; align-items: center; gap: 4px; }
    .notebook-time::before { content: "🕒"; font-size: 0.85rem; }
    .notebook-drugs { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 12px; padding: 14px 18px; font-size: 0.9rem; line-height: 1.8; color: #166534; white-space: pre-wrap; margin-bottom: 12px; }
    .btn-notebook-copy { background: #059669; color: white; box-shadow: 0 2px 4px rgba(5,150,105,0.2); }
    .btn-notebook-copy:hover { background: #047857; box-shadow: 0 4px 6px rgba(5,150,105,0.3); }

    /* ===== タブナビゲーション ===== */
    .tab-bar {
      display: flex;
      gap: 0;
      background: #f3f4f6;
      border-radius: 14px;
      padding: 4px;
      margin-bottom: 20px;
      position: sticky;
      top: 0;
      z-index: 50;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .tab-btn {
      flex: 1;
      padding: 12px 16px;
      border: none;
      background: transparent;
      border-radius: 11px;
      font-size: 0.95rem;
      font-weight: 700;
      color: #6b7280;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .tab-btn:hover { color: #374151; }
    .tab-btn.active {
      background: white;
      color: #111827;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }
    .tab-btn.active.tab-monshin { color: #2563eb; }
    .tab-btn.active.tab-notebook { color: #059669; }
    .tab-badge {
      font-size: 0.75rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 999px;
      min-width: 20px;
      text-align: center;
    }
    .tab-btn.tab-monshin .tab-badge { background: #dbeafe; color: #2563eb; }
    .tab-btn.active.tab-monshin .tab-badge { background: #2563eb; color: white; }
    .tab-btn.tab-notebook .tab-badge { background: #d1fae5; color: #059669; }
    .tab-btn.active.tab-notebook .tab-badge { background: #059669; color: white; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
  </style>
</head>
<body>
  <!-- ===== ログインオーバーレイ ===== -->
  <div id="login-overlay">
    <div class="login-box">
      <div class="login-icon">🔐</div>
      <h2>問診回答管理</h2>
      <p class="login-subtitle">認証が必要です</p>
      <form id="login-form" onsubmit="return handleLogin(event)">
        <div class="login-field">
          <label for="login-id">ユーザーID</label>
          <input type="text" id="login-id" placeholder="IDを入力" autocomplete="username" required>
        </div>
        <div class="login-field">
          <label for="login-pw">パスワード</label>
          <input type="password" id="login-pw" placeholder="パスワードを入力" autocomplete="current-password" required>
        </div>
        <button type="submit" class="login-btn">ログイン</button>
        <div id="login-error" class="login-error"></div>
      </form>
    </div>
  </div>

  <!-- ===== メインコンテンツ（認証後に表示） ===== -->
  <div id="main-content" style="display:none;">
    <div style="max-width: 900px; margin: 0 auto;">

      <!-- タブナビゲーション -->
      <div class="tab-bar" id="tab-bar">
        <button class="tab-btn tab-monshin active" onclick="switchTab('monshin')">
          📋 問診回答 <span class="tab-badge" id="tab-monshin-badge" style="display:none;"></span>
        </button>
        <button class="tab-btn tab-notebook" onclick="switchTab('notebook')">
          📚 手帳データ <span class="tab-badge" id="tab-notebook-badge" style="display:none;"></span>
        </button>
      </div>

      <!-- ===== 問診回答タブ ===== -->
      <div class="tab-panel active" id="panel-monshin">
        <!-- ローディングステータス -->
        <div id="loading-status">
          <span class="spinner"></span>
          <span id="loading-text">データを取得しています...</span>
        </div>

        <!-- エラーボックス -->
        <div id="error-box">
          <p id="error-msg">データの取得に失敗しました。</p>
          <button class="btn btn-retry" onclick="retryFetch()">↺ 再試行</button>
        </div>

        <!-- スケルトンUI -->
        <div id="skeleton" class="skeleton-wrap">
          <div class="skeleton-card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
              <div><div class="skeleton-line header-line"></div><div class="skeleton-line narrow"></div></div>
              <div style="display:flex; gap:10px;"><div class="skeleton-line" style="width:90px;height:36px;border-radius:999px;margin:0;"></div><div class="skeleton-line" style="width:90px;height:36px;border-radius:999px;margin:0;"></div></div>
            </div>
            <div class="skeleton-line narrow" style="margin-bottom:16px;"></div>
            <div class="skeleton-grid">
              <div class="skeleton-block"><div class="skeleton-line wide"></div><div class="skeleton-line medium"></div></div>
              <div class="skeleton-block"><div class="skeleton-line wide"></div><div class="skeleton-line medium"></div></div>
              <div class="skeleton-block"><div class="skeleton-line wide"></div><div class="skeleton-line medium"></div></div>
              <div class="skeleton-block"><div class="skeleton-line wide"></div><div class="skeleton-line medium"></div></div>
            </div>
          </div>
          <div class="skeleton-card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
              <div><div class="skeleton-line header-line"></div><div class="skeleton-line narrow"></div></div>
              <div style="display:flex; gap:10px;"><div class="skeleton-line" style="width:90px;height:36px;border-radius:999px;margin:0;"></div><div class="skeleton-line" style="width:90px;height:36px;border-radius:999px;margin:0;"></div></div>
            </div>
            <div class="skeleton-line narrow" style="margin-bottom:16px;"></div>
            <div class="skeleton-grid">
              <div class="skeleton-block"><div class="skeleton-line wide"></div><div class="skeleton-line medium"></div></div>
              <div class="skeleton-block"><div class="skeleton-line wide"></div><div class="skeleton-line medium"></div></div>
              <div class="skeleton-block"><div class="skeleton-line wide"></div><div class="skeleton-line medium"></div></div>
              <div class="skeleton-block"><div class="skeleton-line wide"></div><div class="skeleton-line medium"></div></div>
            </div>
          </div>
          <div class="skeleton-card" style="opacity:0.5;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
              <div><div class="skeleton-line header-line"></div><div class="skeleton-line narrow"></div></div>
              <div style="display:flex; gap:10px;"><div class="skeleton-line" style="width:90px;height:36px;border-radius:999px;margin:0;"></div><div class="skeleton-line" style="width:90px;height:36px;border-radius:999px;margin:0;"></div></div>
            </div>
            <div class="skeleton-grid">
              <div class="skeleton-block"><div class="skeleton-line wide"></div><div class="skeleton-line medium"></div></div>
              <div class="skeleton-block"><div class="skeleton-line wide"></div><div class="skeleton-line medium"></div></div>
            </div>
          </div>
        </div>

        <div id="msg" style="display:none;"></div>
        <div id="container"></div>
      </div>

      <!-- ===== 手帳データタブ ===== -->
      <div class="tab-panel" id="panel-notebook">
        <div id="notebook-loading" style="text-align:center;padding:40px 0;color:#9ca3af;display:none;">
          <span class="spinner"></span>
          <span>手帳データを取得中...</span>
        </div>
        <div id="notebook-empty" style="display:none;text-align:center;padding:60px 20px;color:#9ca3af;">
          <div style="font-size:3rem;margin-bottom:12px;">📚</div>
          <p style="font-size:1.1rem;font-weight:600;">手帳データはまだありません</p>
        </div>
        <div id="notebook-container"></div>
      </div>

    </div>
  </div>

  <script>
    // ===== 認証システム =====
    const AUTH_HASH = '68c4c50e5c51823f9c822687b4c47a33b47d3a965e5545ec98ff5851c444cf4d';
    const AUTH_KEY = 'admin_authenticated';

    async function sha256(message) {
      const msgBuffer = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function handleLogin(e) {
      e.preventDefault();
      const id = document.getElementById('login-id').value;
      const pw = document.getElementById('login-pw').value;
      const hash = await sha256(id + ':' + pw);
      if (hash === AUTH_HASH) {
        sessionStorage.setItem(AUTH_KEY, 'true');
        showMainContent();
      } else {
        const errEl = document.getElementById('login-error');
        errEl.textContent = 'IDまたはパスワードが違います';
        errEl.style.animation = 'none';
        errEl.offsetHeight; // reflow
        errEl.style.animation = 'shake 0.4s ease';
      }
      return false;
    }

    function showMainContent() {
      const overlay = document.getElementById('login-overlay');
      overlay.classList.add('fade-out');
      setTimeout(() => {
        overlay.style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        fetchPromise = startFetch();
        fetchPromise.then(handleResponse).catch(handleError);
        fetchNotebookData();
      }, 400);
    }

    // ページ読み込み時にセッション確認
    window.addEventListener('DOMContentLoaded', () => {
      if (sessionStorage.getItem(AUTH_KEY) === 'true') {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        fetchPromise = startFetch();
        fetchPromise.then(handleResponse).catch(handleError);
        fetchNotebookData();
      } else {
        document.getElementById('login-id').focus();
      }
    });

    // ===== データ取得 =====
    let listData = [];
    let fetchPromise = null;
    const API_URL = "https://script.google.com/macros/s/AKfycbw3ohRCQ87GMgFqOG-TPKbVE6h5uvCQsuIRl1JChA7mpIFoFDs9S0S6xP6Rx9DH6aVTiQ/exec?action=get";
    const TIMEOUT_MS = 10000; // 10秒でタイムアウト

    function startFetch() {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), TIMEOUT_MS);

      return fetch(API_URL, { signal: controller.signal })
        .then(r => { clearTimeout(timeoutId); return r.json(); });
    }

    function retryFetch() {
      document.getElementById('error-box').style.display = 'none';
      document.getElementById('skeleton').style.display = 'flex';
      document.getElementById('loading-status').style.display = 'flex';
      document.getElementById('loading-text').textContent = 'データを再取得しています...';
      document.getElementById('container').innerHTML = '';
      document.getElementById('msg').style.display = 'none';
      fetchPromise = startFetch();
      fetchPromise.then(handleResponse).catch(handleError);
    }

    function handleResponse(res) {
      document.getElementById('skeleton').style.display = 'none';
      document.getElementById('loading-status').style.display = 'none';

      if (res && res.success) {
        listData = res.list;
        const count = res.list.length;

        if (count === 0) {
          const msg = document.getElementById('msg');
          msg.style.display = 'block';
          msg.textContent = 'データがありません。';
          return;
        }

        // 問診タブバッジ更新
        const badge = document.getElementById('tab-monshin-badge');
        badge.textContent = count;
        badge.style.display = 'inline-block';
        badge.style.display = 'inline-block';

        // 段階的レンダリング: 最初の5件を即時描画、残りはrAFで
        renderBatch(0, 5, true);
      } else {
        showError('エラー: ' + (res ? res.error : '不明なエラー'));
      }
    }

    function handleError(err) {
      document.getElementById('skeleton').style.display = 'none';
      document.getElementById('loading-status').style.display = 'none';
      if (err.name === 'AbortError') {
        showError('タイムアウト: サーバーの応答が遅いです。しばらく待ってから再試行してください。');
      } else {
        showError('通信エラー: ' + err.message);
      }
    }

    function showError(msg) {
      const box = document.getElementById('error-box');
      document.getElementById('error-msg').textContent = msg;
      box.style.display = 'block';
    }

    // バッチレンダリング: start〜endを描画し、残りをrequestAnimationFrameで非同期処理
    function renderBatch(start, end, firstBatch) {
      const container = document.getElementById('container');
      const fragment = document.createDocumentFragment();

      const MUTED_SET = new Set(['なし', 'none', '', 'no', 'なし/飲まない', '該当なし', 'なし/しない', '飲まない']);
      const isMuted = (val) => !val || MUTED_SET.has(val);
      const isHl = (val) => !isMuted(val);
      const formatTel = (tel) => { if (!tel) return '不明'; let d = tel.replace(/[^0-9+]/g, ''); if (d.startsWith('+81')) d = '0' + d.slice(3); d = d.replace(/[^0-9]/g, ''); if (d.match(/^(090|080|070|050)/)) return d.replace(/^(\d{3})(\d{4})(\d{4})$/, '$1-$2-$3'); if (d.match(/^0\d/)) return d.replace(/^(\d{2,4})(\d{2,4})(\d{4})$/, '$1-$2-$3'); return tel; };

      const highlight = (val) => {
        if (isMuted(val)) return `<span class="text-muted">${val || 'なし'}</span>`;
        if (val === 'yes') return `<span style="color:#06C755; font-weight:700;">あり</span>`;
        return `<span style="color:#06C755; font-weight:700;">${val}</span>`;
      };

      const mkLabel = (text) => `<span class="label">${text}</span>`;
      const formatKV = (lbl, val) => `<span style="color:${isHl(val)?'#06C755':'#9ca3af'}; font-weight:${isHl(val)?'700':'400'}; margin-right:4px;">${lbl}:</span> ${highlight(val)}`;

      const actualEnd = Math.min(end, listData.length);
      for (let i = start; i < actualEnd; i++) {
        const item = listData[i];
        const hasWarning = (
          item['薬アレルギー'] === 'あり' || 
          item['食品アレルギー'] === 'あり' || 
          (item['環境アレルギー'] && item['環境アレルギー'] !== 'なし' && item['環境アレルギー'] !== '') ||
          item['副作用'] === 'あり'
        );

        const div = document.createElement('div');
        div.className = 'card';
        if (hasWarning) div.style.borderLeft = '6px solid var(--danger-text)';

        div.innerHTML = `
          <div class="header">
            <div class="name">
              ${item['名前'] || '名前なし'} <span style="font-size: 1rem; color: #6b7280; font-weight: normal;">様</span>
              <span class="name-sub">TEL: ${formatTel(item['電話番号'])}</span>
            </div>
            <div class="actions">
              <button class="btn btn-primary" onclick="copyText(${i}, this)">MEDIXS用</button>
              <button class="btn btn-secondary" onclick="copyText(${i}, this, true)">調剤くん用</button>
            </div>
          </div>
          <div class="time">受信: ${item['日時'] || ''}</div>
          
          <div class="data-grid">
            <div class="data-item">
              ${mkLabel('患者様の状態')}
              <span class="val">${(() => { const s = item['状態']; if (!s || s === 'none' || s === 'なし/飲まない' || s === 'なし/しない' || s === 'なし') return '<span class="text-muted">該当なし</span>'; if (s === 'pregnant' || s === '妊娠中(可能性あり)' || s === '妊娠中') return '<span style="color:#06C755; font-weight:700;">妊娠中(可能性あり)</span>'; if (s === 'breastfeeding' || s === '授乳中') return '<span style="color:#06C755; font-weight:700;">授乳中</span>'; if (s === 'pediatric' || s === '小児(15歳未満)' || s === '小児') return '<span style="color:#06C755; font-weight:700;">小児(15歳未満)</span>'; return highlight(s); })()}</span>
              ${item['妊婦体重'] ? `<div style="font-size:0.8rem; color:#6b7280; margin-top:4px;">(体重: ${item['妊婦体重']}kg)</div>` : ''}
              ${item['授乳婦体重'] ? `<div style="font-size:0.8rem; color:#6b7280; margin-top:4px;">(体重: ${item['授乳婦体重']}kg)</div>` : ''}
              ${item['小児体重'] ? `<div style="font-size:0.8rem; color:#6b7280; margin-top:4px;">(体重: ${item['小児体重']}kg)</div>` : ''}
            </div>
            <div class="data-item">
              ${mkLabel('後発品変更希望')}
              <span class="val" style="${item['ジェネリック'] && item['ジェネリック'] !== 'なし' ? 'color:#06C755; font-weight:700;' : ''}">${(() => { const g = item['ジェネリック']; if (!g || g === 'なし') return '<span class="text-muted">なし</span>'; if (g === 'prefer') return 'ジェネリックで大丈夫'; if (g === 'ag') return 'オーソライズド・ジェネリック希望'; if (g === 'avoid') return '先発医薬品を希望する'; return g; })()}</span>
            </div>
            <div class="data-item">
              ${mkLabel('手帳活用の有無')}
              <span class="val" style="${item['お薬手帳'] && item['お薬手帳'] !== 'なし' ? 'color:#06C755; font-weight:700;' : ''}">${!item['お薬手帳'] || item['お薬手帳']==='なし' ? '<span class="text-muted">なし</span>' : item['お薬手帳']}</span>
            </div>
            <div class="data-item">
              ${mkLabel('既往歴')}
              <span class="val">${highlight(item['既往歴'])}</span>
              ${item['既往歴詳細'] ? `<div style="font-size:0.8rem; color:#6b7280; margin-top:4px;">(詳: ${item['既往歴詳細']})</div>` : ''}
            </div>
            <div class="data-item">
              ${mkLabel('花粉症・アレルゲンについて')}
              <span class="val">${highlight(item['環境アレルギー'])}</span>
            </div>
            <div class="data-item">
              ${mkLabel('副作用歴、薬物アレルギー')}
              <span class="val">${item['副作用'] && item['副作用'] !== 'なし' ? formatKV('副作用', item['副作用']) + '<br>' : ''}${formatKV('薬物アレルギー', item['薬アレルギー'])}</span>
              ${item['副作用詳細'] ? `<div style="font-size:0.8rem; color:#6b7280; margin-top:4px;">(副作用詳細: ${item['副作用詳細']})</div>` : ''}
              ${item['アレルギー詳細'] ? `<div style="font-size:0.8rem; color:#6b7280; margin-top:4px;">(詳細: ${item['アレルギー詳細']})</div>` : ''}
            </div>
            <div class="data-item">
              ${mkLabel('食物等アレルギー')}
              <span class="val">${highlight(item['食品アレルギー'])}</span>
              ${item['食品詳細'] ? `<div style="font-size:0.8rem; color:#6b7280; margin-top:4px;">(食物詳細: ${item['食品詳細']})</div>` : ''}
            </div>
            <div class="data-item">
              ${mkLabel('定期的服用薬・サプリメント・OTC')}
              <span class="val">${formatKV('他院処方', item['他院処方'])}<br>${formatKV('市販薬･サプリ', item['市販薬'])}</span>
              ${item['他院詳細'] ? `<div style="font-size:0.8rem; color:#6b7280; margin-top:4px;">(他院処方詳細: ${item['他院詳細']})</div>` : ''}
              ${item['市販薬詳細'] ? `<div style="font-size:0.8rem; color:#6b7280; margin-top:4px;">(市販薬詳細: ${item['市販薬詳細']})</div>` : ''}
            </div>
            <div class="data-item">
              ${mkLabel('飲食物の摂取状況等')}
              <span class="val">${formatKV('酒', item['酒'])}<br>${formatKV('飲食物', item['飲食物'])}</span>
              ${item['飲食物詳細'] ? `<div style="font-size:0.8rem; color:#6b7280; margin-top:4px;">(飲食物詳細: ${item['飲食物詳細']})</div>` : ''}
            </div>
            <div class="data-item">
              ${mkLabel('薬学的管理に必要な患者の生活像')}
              <span class="val" style="line-height:2;">
                ${(() => { 
                  const s = item['状態']; 
                  const hl = isHl(s);
                  const lblColor = hl ? '#06C755' : '#9ca3af';
                  const lblWeight = hl ? '700' : '400';
                  let vHtml = highlight(s);
                  if (s === 'pregnant' || s === '妊娠中(可能性あり)' || s === '妊娠中') vHtml = `<span style="color:#06C755; font-weight:700;">妊娠中(可能性あり)</span>`; 
                  else if (s === 'breastfeeding' || s === '授乳中') vHtml = `<span style="color:#06C755; font-weight:700;">授乳中</span>`; 
                  else if (s === 'pediatric' || s === '小児(15歳未満)' || s === '小児') vHtml = `<span style="color:#06C755; font-weight:700;">小児(15歳未満)</span>`;
                  return `<span style="color:${lblColor}; font-weight:${lblWeight}; margin-right:4px;">妊娠・授乳・小児:</span> ${vHtml}`;
                })()}<br>
                ${formatKV('運転', item['運転'])}<br>
                ${formatKV('高所作業', item['高所'])}<br>
                ${formatKV('コンタクト', item['ソフトコンタクト'])}<br>
                ${formatKV('喫煙', item['煙草'])}
              </span>
            </div>
          </div>
          ${item['備考'] ? `
          <div class="data-item" style="margin-top:16px; border:1px solid #fde68a; border-left: 4px solid #f59e0b; background:#fffbeb; padding:16px; border-radius:12px;">
            <span class="label" style="color:#b45309;">特記事項</span>
            <span class="val" style="color:#b45309; font-weight:700;">${item['備考']}</span>
          </div>` : ''}
        `;

        fragment.appendChild(div);
      }

      container.appendChild(fragment);

      // フェードイン: 次のフレームでvisibleを付与
      requestAnimationFrame(() => {
        const newCards = container.querySelectorAll('.card:not(.visible)');
        newCards.forEach((card, idx) => {
          setTimeout(() => { card.classList.add('visible'); }, idx * 40);
        });
      });

      // 残りがあればrequestIdleCallbackで続きを描画
      if (actualEnd < listData.length) {
        const renderNext = () => renderBatch(actualEnd, actualEnd + 10, false);
        if (typeof requestIdleCallback !== 'undefined') {
          requestIdleCallback(renderNext, { timeout: 500 });
        } else {
          setTimeout(renderNext, 100);
        }
      }
    }

    // window.onload は不要（DOMContentLoadedで認証後にfetch開始するため）

    // ===== Chrome拡張連携設定 =====
    // Chrome拡張インストール後、chrome://extensions で表示されるIDに置き換えてください
    const MEDIXS_EXTENSION_ID = 'gekigkglmaeohlpnbmdleckcompealfj';

    function copyText(idx, btn, isChozaiKun = false) {
      const item = listData[idx];
      const formatTel = (tel) => { if (!tel) return '不明'; let d = tel.replace(/[^0-9+]/g, ''); if (d.startsWith('+81')) d = '0' + d.slice(3); d = d.replace(/[^0-9]/g, ''); if (d.match(/^(090|080|070|050)/)) return d.replace(/^(\d{3})(\d{4})(\d{4})$/, '$1-$2-$3'); if (d.match(/^0\d/)) return d.replace(/^(\d{2,4})(\d{2,4})(\d{4})$/, '$1-$2-$3'); return tel; };
      let text = isChozaiKun ? "" : "【初回問診引用】\n";
      if (isChozaiKun) {
        text += `■電話番号: ${formatTel(item['電話番号'])}\n`;
      }

      const formatVal = (val) => {
        if (!val || val === 'なし/しない' || val === 'なし/飲まない' || val === '飲まない' || val === 'false' || val === 'none' || val === 'no') return 'なし';
        if (val === 'yes') return 'あり';
        return val;
      };
      
      const getDetail = (val, detail) => {
        let v = formatVal(val);
        if (v !== 'なし' && detail) {
            return `${v} (${detail})`;
        }
        return v;
      };

      const formatCondition = (val) => {
        if (!val || val === 'none' || val === 'なし/飲まない' || val === 'なし/しない' || val === 'なし') return '該当なし';
        if (val === 'pregnant' || val === '妊娠中(可能性あり)') return '妊娠中(可能性あり)';
        if (val === 'breastfeeding' || val === '授乳中') return '授乳中';
        if (val === 'pediatric' || val === '小児(15歳未満)') return '小児(15歳未満)';
        return val;
      };
      const formatGeneric = (val) => {
        if (!val) return 'なし';
        if (val === 'prefer') return 'ジェネリックで大丈夫';
        if (val === 'ag') return 'オーソライズド・ジェネリックでなら希望';
        if (val === 'avoid') return '先発医薬品を希望する';
        return val;
      };

      text += `■患者様の状態: ${formatCondition(item['状態'])}\n`;
      if (item['妊婦体重']) text += `  └ 体重: ${item['妊婦体重']}kg\n`;
      if (item['授乳婦体重']) text += `  └ 体重: ${item['授乳婦体重']}kg\n`;
      if (item['小児体重']) text += `  └ 体重: ${item['小児体重']}kg\n`;
      text += `■後発品変更希望: ${formatGeneric(item['ジェネリック'])}\n`;
      text += `■手帳活用の有無: ${formatVal(item['お薬手帳'])}\n`;
      text += `■既往歴: ${getDetail(item['既往歴'], item['既往歴詳細'])}\n`;
      text += `■花粉症・アレルゲンについて: ${formatVal(item['環境アレルギー'])}\n`;
      const sideEffectStr = item['副作用'] && item['副作用'] !== 'なし' ? ` 副作用:${getDetail(item['副作用'], item['副作用詳細'])} /` : '';
      text += `■副作用歴、薬物アレルギー:${sideEffectStr} 薬・副作用等:${getDetail(item['薬アレルギー'], item['アレルギー詳細'])}\n`;
      text += `■食物等アレルギー: ${getDetail(item['食品アレルギー'], item['食品詳細'])}\n`;
      text += `■定期的服用薬・サプリメント・OTC: 他院処方:${getDetail(item['他院処方'], item['他院詳細'])} / 市販薬･サプリ:${getDetail(item['市販薬'], item['市販薬詳細'])}\n`;
      text += `■飲食物の摂取状況等: 酒:${formatVal(item['酒'])} / 飲食物:${getDetail(item['飲食物'], item['飲食物詳細'])}\n`;
      text += `■薬学的管理に必要な患者の生活像: 妊娠・授乳・小児:${formatCondition(item['状態'])} / 運転:${formatVal(item['運転'])} / 高所作業:${formatVal(item['高所'])} / コンタクト:${formatVal(item['ソフトコンタクト'])} / 喫煙:${formatVal(item['煙草'])}\n`;
      if (item['備考']) {
        text += `■特記事項: ${item['備考']}\n`;
      }

      // MEDIXS用（調剤くん用でない場合）: Chrome拡張連携を試みる
      if (!isChozaiKun && MEDIXS_EXTENSION_ID !== '__EXTENSION_ID_HERE__' && typeof chrome !== 'undefined' && chrome.runtime && chrome.runtime.sendMessage) {
        // Chrome拡張経由で直接送信（タイムアウト + リトライ付き）
        btn.innerText = '送信中...';
        btn.disabled = true;

        sendToExtensionWithRetry(text, btn, 2); // 最大2回試行
      } else {
        // 調剤くん用 or 拡張IDが未設定 → 従来のクリップボードコピー
        clipboardCopy(text, btn);
      }
    }

    function clipboardCopy(text, btn) {
      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => {
          const old = btn.innerText;
          btn.innerText = 'コピー完了！';
          setTimeout(() => { btn.innerText = old; }, 1500);
        }).catch(() => fallbackCopy(text, btn));
      } else {
        fallbackCopy(text, btn);
      }
    }

    // ===== Chrome拡張連携（タイムアウト + リトライ） =====
    function sendToExtension(text) {
      return new Promise((resolve) => {
        let settled = false;
        const timer = setTimeout(() => {
          if (!settled) {
            settled = true;
            console.warn('[admin] Chrome拡張応答タイムアウト(8秒)');
            resolve({ success: false, error: 'タイムアウト' });
          }
        }, 8000);

        try {
          chrome.runtime.sendMessage(MEDIXS_EXTENSION_ID, {
            type: 'MONSHIN_PASTE',
            text: text
          }, (response) => {
            if (settled) return;
            settled = true;
            clearTimeout(timer);
            if (chrome.runtime.lastError || !response) {
              const errMsg = chrome.runtime.lastError ? chrome.runtime.lastError.message : '応答なし';
              console.warn('[admin] Chrome拡張エラー:', errMsg);
              resolve({ success: false, error: errMsg });
            } else {
              resolve(response);
            }
          });
        } catch (e) {
          if (!settled) {
            settled = true;
            clearTimeout(timer);
            console.warn('[admin] sendMessage例外:', e.message);
            resolve({ success: false, error: e.message });
          }
        }
      });
    }

    async function sendToExtensionWithRetry(text, btn, maxAttempts) {
      for (let attempt = 1; attempt <= maxAttempts; attempt++) {
        btn.innerText = attempt > 1 ? `リトライ中... (${attempt}/${maxAttempts})` : '送信中...';
        console.log(`[admin] 拡張送信 試行${attempt}/${maxAttempts}`);

        const result = await sendToExtension(text);

        if (result && result.success) {
          btn.disabled = false;
          btn.innerText = `✅ ${result.count}箇所入力完了！`;
          btn.style.background = '#059669';
          setTimeout(() => { btn.innerText = 'MEDIXS用'; btn.style.background = ''; }, 3000);
          return;
        }

        console.warn(`[admin] 試行${attempt}失敗:`, result?.error);

        // 最後の試行でなければ1秒待ってリトライ
        if (attempt < maxAttempts) {
          await new Promise(r => setTimeout(r, 1000));
        }
      }

      // 全試行失敗 → クリップボードにフォールバック
      console.warn('[admin] 全試行失敗、クリップボードにフォールバック');
      btn.disabled = false;
      clipboardCopy(text, btn);
    }

    function fallbackCopy(text, btn) {
      const el = document.createElement('textarea');
      el.value = text;
      el.style.position = 'fixed';
      el.style.left = '-9999px';
      document.body.appendChild(el); 
      el.select();
      document.execCommand('copy'); 
      document.body.removeChild(el);
      const old = btn.innerText;
      btn.innerText = 'コピー完了！';
      setTimeout(() => { btn.innerText = old; }, 1500);
    }

    // ===== タブ切り替え =====
    function switchTab(tabName) {
      // パネル切り替え
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('panel-' + tabName).classList.add('active');
      // タブボタン切り替え
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelector('.tab-' + tabName).classList.add('active');
      window.scrollTo(0, 0);
    }

    // ===== 手帳データ取得・表示 =====
    const NOTEBOOK_API_URL = API_URL.replace('action=get', 'action=getNotebook');
    let notebookData = [];

    function fetchNotebookData() {
      document.getElementById('notebook-loading').style.display = 'block';
      fetch(NOTEBOOK_API_URL)
        .then(r => r.json())
        .then(res => {
          document.getElementById('notebook-loading').style.display = 'none';
          if (res && res.success && res.list.length > 0) {
            notebookData = res.list;
            // タブバッジ更新
            const badge = document.getElementById('tab-notebook-badge');
            badge.textContent = notebookData.length;
            badge.style.display = 'inline-block';
            renderNotebookCards();
          } else {
            document.getElementById('notebook-empty').style.display = 'block';
          }
        })
        .catch(err => {
          document.getElementById('notebook-loading').style.display = 'none';
          document.getElementById('notebook-empty').style.display = 'block';
          console.error('手帳データ取得エラー:', err);
        });
    }

    function renderNotebookCards() {
      const container = document.getElementById('notebook-container');
      container.innerHTML = '';

      const fragment = document.createDocumentFragment();
      notebookData.forEach((item, idx) => {
        const div = document.createElement('div');
        div.className = 'notebook-card';
        div.innerHTML = `
          <div class="notebook-header">
            <div>
              <span class="notebook-name">${item['氏名'] || '不明'} <span style="font-size:1rem;color:#6b7280;font-weight:normal;">様</span></span>
              <span class="notebook-time">${item['日時'] || ''}</span>
            </div>
            <div class="actions">
              <button class="btn btn-primary" onclick="sendDrugsToExtension(${idx}, this)">MEDIXS併用薬</button>
              <button class="btn btn-notebook-copy" onclick="copyNotebook(${idx}, this)">コピー</button>
            </div>
          </div>
          <div class="notebook-drugs">${item['医薬品名'] || ''}</div>
        `;
        fragment.appendChild(div);
      });
      container.appendChild(fragment);

      requestAnimationFrame(() => {
        container.querySelectorAll('.notebook-card').forEach((card, i) => {
          setTimeout(() => card.classList.add('visible'), i * 50);
        });
      });
    }

    function copyNotebook(idx, btn) {
      const item = notebookData[idx];
      const text = item['医薬品名'] || '';
      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => {
          const old = btn.innerText;
          btn.innerText = 'コピー完了！';
          setTimeout(() => { btn.innerText = old; }, 1500);
        }).catch(() => fallbackCopy(text, btn));
      } else {
        fallbackCopy(text, btn);
      }
    }

    // ===== 手帳→MEDIXS併用薬 自動入力 =====
    function sendDrugsToExtension(idx, btn) {
      const item = notebookData[idx];
      const text = item['医薬品名'] || '';
      // 改行で分割して空行を除去
      const drugs = text.split(/\n/).map(s => s.trim()).filter(s => s !== '');

      if (drugs.length === 0) {
        btn.innerText = '薬品名なし';
        setTimeout(() => { btn.innerText = 'MEDIXS併用薬'; }, 2000);
        return;
      }

      // 拡張IDが未設定 or Chrome拡張APIがない場合 → クリップボードにフォールバック
      if (MEDIXS_EXTENSION_ID === '__EXTENSION_ID_HERE__' || typeof chrome === 'undefined' || !chrome.runtime || !chrome.runtime.sendMessage) {
        clipboardCopy(text, btn);
        return;
      }

      btn.innerText = `送信中... (${drugs.length}品目)`;
      btn.disabled = true;

      // admin.htmlのウィンドウをblurしてMEDIXSが最前面に来るようにする
      window.blur();

      // タイムアウト付き送信
      let settled = false;
      const timer = setTimeout(() => {
        if (!settled) {
          settled = true;
          btn.disabled = false;
          btn.innerText = 'タイムアウト';
          setTimeout(() => { btn.innerText = 'MEDIXS併用薬'; }, 3000);
        }
      }, 60000); // 併用薬は複数品目あるので60秒タイムアウト

      try {
        chrome.runtime.sendMessage(MEDIXS_EXTENSION_ID, {
          type: 'DRUG_PASTE',
          drugs: drugs
        }, (response) => {
          if (settled) return;
          settled = true;
          clearTimeout(timer);
          btn.disabled = false;

          if (chrome.runtime.lastError || !response) {
            const errMsg = chrome.runtime.lastError ? chrome.runtime.lastError.message : '応答なし';
            console.warn('[admin] 併用薬送信エラー:', errMsg);
            btn.innerText = 'エラー: ' + errMsg;
            setTimeout(() => { btn.innerText = 'MEDIXS併用薬'; }, 3000);
            return;
          }

          if (response.success) {
            btn.innerText = `✅ ${response.successCount}/${response.total}品目入力完了！`;
            btn.style.background = '#059669';
            setTimeout(() => { btn.innerText = 'MEDIXS併用薬'; btn.style.background = ''; }, 4000);
          } else {
            btn.innerText = response.error || '失敗';
            setTimeout(() => { btn.innerText = 'MEDIXS併用薬'; }, 3000);
          }

          if (response.errors && response.errors.length > 0) {
            console.warn('[admin] 併用薬エラー:', response.errors);
          }
        });
      } catch (e) {
        if (!settled) {
          settled = true;
          clearTimeout(timer);
          btn.disabled = false;
          clipboardCopy(text, btn);
        }
      }
    }
  </script>
</body>
</html>
