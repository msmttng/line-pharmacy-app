<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>【薬局】初回問診票</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app" class="app-container">
        <header class="app-header">
            <h1>初回問診票</h1>
            <div class="progress-bar-container">
                <div id="progress-bar" class="progress-bar" style="width: 10%;"></div>
            </div>
        </header>

        <main class="form-container">
            <form id="questionnaire-form">
                
                <!-- Step 1: Basic Info -->
                <section class="form-step active" data-step="1">
                    <h2 class="step-title">基本情報</h2>
                    <div class="input-group">
                        <label for="name">お名前（漢字）<span class="required">必須</span></label>
                        <input type="text" id="name" name="name" placeholder="山田 太郎" required>
                    </div>
                    <div class="input-group">
                        <label for="phone">電話番号<span class="required">必須</span></label>
                        <input type="tel" id="phone" name="phone" placeholder="09012345678" required>
                    </div>
                    <div class="input-group">
                        <label>お薬手帳はお持ちですか？<span class="required">必須</span></label>
                        <div class="radio-group">
                            <label class="radio-label"><input type="radio" name="booklet" value="yes" required><span>あり</span></label>
                            <label class="radio-label"><input type="radio" name="booklet" value="no"><span>なし</span></label>
                        </div>
                    </div>
                    <div id="booklet-type-group" class="input-group hidden">
                        <label>手帳の種類を教えてください<span class="required">必須</span></label>
                        <div class="radio-group">
                            <label class="radio-label"><input type="radio" name="booklet-type" value="paper"><span>紙</span></label>
                            <label class="radio-label"><input type="radio" name="booklet-type" value="digital"><span>電子（アプリ）</span></label>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>該当する状態を選んでください<span class="required">必須</span></label>
                        <div class="radio-group vertical">
                            <label class="radio-label"><input type="radio" name="patient-condition" value="none" checked required><span>該当なし</span></label>
                            <label class="radio-label"><input type="radio" name="patient-condition" value="pregnant"><span>妊娠している（またはその可能性がある）</span></label>
                            <label class="radio-label"><input type="radio" name="patient-condition" value="breastfeeding"><span>授乳中である</span></label>
                            <label class="radio-label"><input type="radio" name="patient-condition" value="pediatric"><span>小児である（15歳未満）</span></label>
                        </div>
                    </div>
                    <div id="weight-input-group" class="input-group hidden">
                        <label for="weight">体重をご記入ください<span class="required">必須</span></label>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <input type="number" id="weight" name="weight" placeholder="例: 50" min="0" step="0.1" style="width: 120px;">
                            <span>kg</span>
                        </div>
                    </div>
                </section>

                <!-- Step 2: Allergies -->
                <section class="form-step" data-step="2">
                    <h2 class="step-title">アレルギー・副作用について</h2>
                    <div class="input-group">
                        <label>過去に薬でアレルギーや副作用が出たことはありますか？<span class="required">必須</span></label>
                        <div class="radio-group">
                            <label class="radio-label"><input type="radio" name="drug-allergy" value="no" required><span>ない</span></label>
                            <label class="radio-label"><input type="radio" name="drug-allergy" value="yes"><span>ある</span></label>
                        </div>
                        <input type="text" name="drug-allergy-detail" class="sub-input hidden" placeholder="具体的な薬名や症状をご記入ください">
                    </div>
                    <div class="input-group">
                        <label>食物アレルギーはありますか？</label>
                        <div class="radio-group">
                            <label class="radio-label"><input type="radio" name="food-allergy" value="no"><span>ない</span></label>
                            <label class="radio-label"><input type="radio" name="food-allergy" value="yes"><span>ある</span></label>
                        </div>
                        <input type="text" name="food-allergy-detail" class="sub-input hidden" placeholder="具体的な食物名をご記入ください">
                    </div>

                    <!-- New Allergy Section -->
                    <div class="input-group">
                        <label>花粉症・ハウスダストなど環境アレルギーはありますか？</label>
                        <div class="checkbox-grid">
                            <label class="checkbox-label"><input type="checkbox" name="env-allergy" value="hayfever-sugi"><span>スギの花粉症</span></label>
                            <label class="checkbox-label"><input type="checkbox" name="env-allergy" value="hayfever-hinoki"><span>ヒノキの花粉症</span></label>
                            <label class="checkbox-label"><input type="checkbox" name="env-allergy" value="hayfever-ine"><span>イネの花粉症</span></label>
                            <label class="checkbox-label"><input type="checkbox" name="env-allergy" value="hayfever-butakusa"><span>ブタクサの花粉症</span></label>
                            <label class="checkbox-label"><input type="checkbox" name="env-allergy" value="hayfever-kamogaya"><span>カモガヤの花粉症</span></label>
                            <label class="checkbox-label"><input type="checkbox" name="env-allergy" value="hayfever-other"><span>その他の花粉症</span></label>
                            <label class="checkbox-label"><input type="checkbox" name="env-allergy" value="housedust"><span>ハウスダスト</span></label>
                            <label class="checkbox-label"><input type="checkbox" name="env-allergy" value="mite"><span>ダニ</span></label>
                            <label class="checkbox-label"><input type="checkbox" name="env-allergy" value="dog-cat"><span>犬・猫</span></label>
                            <label class="checkbox-label"><input type="checkbox" name="env-allergy" value="temp"><span>寒暖差</span></label>
                            <label class="checkbox-label"><input type="checkbox" name="env-allergy" value="perennial"><span>通年性</span></label>
                            <label class="checkbox-label"><input type="checkbox" name="env-allergy" value="other"><span>その他</span></label>
                        </div>
                    </div>
                </section>

                <!-- Step 3: Current Medications -->
                <section class="form-step" data-step="3">
                    <h2 class="step-title">現在の服用状況</h2>
                    <div class="input-group">
                        <label>服用中のお薬はありますか？</label>
                        <div class="info-note-small" style="color: var(--line-green); font-weight: bold;">
                            ※お薬手帳やマイナ保険証で医療情報を公開している場合は「あり」を選択し、以下の詳細入力は不要です。
                        </div>
                        <div class="radio-group">
                            <label class="radio-label"><input type="radio" name="current-presc" value="no"><span>ない</span></label>
                            <label class="radio-label"><input type="radio" name="current-presc" value="yes"><span>ある</span></label>
                        </div>
                        <textarea name="current-presc-detail" class="sub-input hidden" placeholder="具体的な薬名や症状をご記入ください"></textarea>
                    </div>
                    <div class="input-group">
                        <label>市販薬やサプリメントを飲んでいますか？（複数選択可）</label>
                        <div class="checkbox-grid">
                            <label class="checkbox-label"><input type="checkbox" name="otc-list" value="cold"><span>風邪薬</span></label>
                            <label class="checkbox-label"><input type="checkbox" name="otc-list" value="pain"><span>痛み止め</span></label>
                            <label class="checkbox-label"><input type="checkbox" name="otc-list" value="rhinitis"><span>鼻炎薬</span></label>
                            <label class="checkbox-label"><input type="checkbox" name="otc-list" value="stomach"><span>胃腸薬</span></label>
                            <label class="checkbox-label"><input type="checkbox" name="otc-list" value="constipation"><span>便秘薬</span></label>
                            <label class="checkbox-label"><input type="checkbox" name="otc-list" value="kanpo"><span>漢方薬</span></label>
                            <label class="checkbox-label"><input type="checkbox" name="otc-list" value="eye"><span>目薬</span></label>
                            <label class="checkbox-label"><input type="checkbox" name="otc-list" value="vitamin"><span>ビタミン</span></label>
                            <label class="checkbox-label"><input type="checkbox" name="otc-list" value="multi-mineral"><span>マルチミネラル</span></label>
                            <label class="checkbox-label"><input type="checkbox" name="otc-list" value="iron"><span>鉄</span></label>
                            <label class="checkbox-label"><input type="checkbox" name="otc-list" value="zinc"><span>亜鉛</span></label>
                            <label class="checkbox-label"><input type="checkbox" name="otc-list" value="calcium"><span>カルシウム</span></label>
                            <label class="checkbox-label"><input type="checkbox" name="otc-list" value="magnesium"><span>マグネシウム</span></label>
                            <label class="checkbox-label"><input type="checkbox" name="otc-list" value="dha-epa"><span>DHA/EPA</span></label>
                            <label class="checkbox-label"><input type="checkbox" name="otc-list" value="protein"><span>プロテイン</span></label>
                            <label class="checkbox-label"><input type="checkbox" name="otc-list" value="other"><span>その他</span></label>
                        </div>
                        <textarea name="otc-suppl-detail" class="sub-input mt-10" placeholder="具体的な商品名などがあればご記入ください"></textarea>
                    </div>
                    <div class="input-group">
                        <label>日常的によく摂取している飲食物はありますか？<br><span style="font-size: 0.85em; font-weight: normal; color: var(--text-sub);">（お薬との飲み合わせ確認のため・複数選択可）</span></label>
                        <div class="checkbox-grid">
                            <label class="checkbox-label"><input type="checkbox" name="food-drink" value="coffee-tea"><span>コーヒー・紅茶</span></label>
                            <label class="checkbox-label"><input type="checkbox" name="food-drink" value="grapefruit"><span>グレープフルーツジュース</span></label>
                            <label class="checkbox-label"><input type="checkbox" name="food-drink" value="dairy"><span>乳製品</span></label>
                            <label class="checkbox-label"><input type="checkbox" name="food-drink" value="other"><span>その他</span></label>
                        </div>
                        <textarea name="food-drink-detail" class="sub-input mt-10" placeholder="その他の場合は具体的な名称をご記入ください"></textarea>
                    </div>
                </section>

                <!-- Step 4: Medical History -->
                <section class="form-step" data-step="4">
                    <h2 class="step-title">既往歴・現病歴</h2>
                    <div class="input-group">
                        <label>現在治療中の病気や過去にかかった大きな病気はありますか？（複数選択可）</label>
                        <div class="checkbox-grid">
                            <label class="checkbox-label"><input type="checkbox" name="history" value="hypertension"><span>高血圧</span></label>
                            <label class="checkbox-label"><input type="checkbox" name="history" value="diabetes"><span>糖尿病</span></label>
                            <label class="checkbox-label"><input type="checkbox" name="history" value="heart"><span>心臓病</span></label>
                            <label class="checkbox-label"><input type="checkbox" name="history" value="kidney"><span>腎臓病</span></label>
                            <label class="checkbox-label"><input type="checkbox" name="history" value="liver"><span>肝臓病</span></label>
                            <label class="checkbox-label"><input type="checkbox" name="history" value="asthma"><span>喘息</span></label>
                            <label class="checkbox-label"><input type="checkbox" name="history" value="epilepsy"><span>てんかん</span></label>
                            <label class="checkbox-label"><input type="checkbox" name="history" value="glaucoma"><span>緑内障</span></label>
                            <label class="checkbox-label"><input type="checkbox" name="history" value="prostate"><span>前立腺肥大</span></label>
                            <label class="checkbox-label"><input type="checkbox" name="history" value="other"><span>その他</span></label>
                        </div>
                        <input type="text" name="history-other-detail" class="sub-input mt-10" placeholder="その他の場合は病名をご記入ください">
                    </div>
                </section>

                <!-- Step 5: Lifestyle & Occupational Safety -->
                <section class="form-step" data-step="5">
                    <h2 class="step-title">生活習慣・お仕事</h2>
                    <div class="input-group">
                        <label>お仕事や日常生活で、車の運転をされますか？<span class="required">必須</span></label>
                        <div class="radio-group">
                            <label class="radio-label"><input type="radio" name="driving" value="no" required><span>しない</span></label>
                            <label class="radio-label"><input type="radio" name="driving" value="yes"><span>する</span></label>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>高所作業（高い所での作業）をされますか？<span class="required">必須</span></label>
                        <div class="radio-group">
                            <label class="radio-label"><input type="radio" name="height-work" value="no" required><span>ない</span></label>
                            <label class="radio-label"><input type="radio" name="height-work" value="yes"><span>ある</span></label>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>ソフトコンタクトの使用</label>
                        <div class="radio-group">
                            <label class="radio-label"><input type="radio" name="soft-contact" value="no"><span>なし</span></label>
                            <label class="radio-label"><input type="radio" name="soft-contact" value="yes"><span>あり</span></label>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>お酒は飲みますか？</label>
                        <select name="alcohol">
                            <option value="none">飲まない</option>
                            <option value="occasionally">時々</option>
                            <option value="daily">毎日</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>タバコは吸いますか？</label>
                        <div class="radio-group">
                            <label class="radio-label"><input type="radio" name="smoking" value="no"><span>吸わない</span></label>
                            <label class="radio-label"><input type="radio" name="smoking" value="yes"><span>吸う</span></label>
                        </div>
                    </div>
                </section>

                <!-- Step 6: Preferences & Other -->
                <section class="form-step" data-step="6">
                    <h2 class="step-title">ご要望・その他</h2>
                    <div class="input-group">
                        <label>ジェネリック医薬品（後発品）の希望</label>
                        <div class="info-note-small" style="background:#f9f9f9; padding:10px; border-radius:8px; margin-bottom:15px; border:1px solid #eee;">
                            <p style="margin:0 0 5px 0; font-weight:bold; font-size:0.85rem;">【ジェネリック医薬品とは】</p>
                            <p style="margin:0 0 10px 0; font-size:0.8rem; color:#555;">先発医薬品と同等の効き目・安全性を持ち、より安価なお薬です。</p>
                            <p style="margin:0 0 5px 0; font-weight:bold; font-size:0.85rem;">【AG（オーソライズド・ジェネリック）】</p>
                            <p style="margin:0; font-size:0.8rem; color:#555;">先発品メーカー公認の、成分・製法が<b>先発品と全く同じ</b>ジェネリックです。</p>
                        </div>
                        <div class="radio-group vertical">
                            <label class="radio-label"><input type="radio" name="generic" value="prefer" checked><span>ジェネリック希望</span></label>
                            <label class="radio-label"><input type="radio" name="generic" value="avoid"><span>先発希望</span></label>
                            <label class="radio-label"><input type="radio" name="generic" value="ag"><span>先発（AGなら希望）</span></label>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="memo">その他、薬剤師に伝えておきたいこと</label>
                        <textarea id="memo" name="memo" placeholder="（例）粉薬が苦手、飲み合わせが不安など"></textarea>
                    </div>
                </section>

                <!-- Step 7: Confirmation -->
                <section class="form-step" data-step="7">
                    <h2 class="step-title">入力内容の確認</h2>
                    <div id="confirmation-view" class="confirmation-view">
                        <!-- Content via JS -->
                    </div>
                    <div class="agreement" style="margin-top: 30px; display: flex; align-items: center; justify-content: center; gap: 10px;">
                        <input type="checkbox" id="agree" required style="width: 24px; height: 24px; cursor: pointer;">
                        <label for="agree" style="font-weight: bold; cursor: pointer; display: inline-block; margin-bottom: 0;">個人情報の取り扱いに同意します</label>
                    </div>
                </section>

                <!-- Navigation Buttons -->
                <div class="form-nav">
                    <button type="button" id="prev-btn" class="btn btn-secondary hidden">戻る</button>
                    <button type="button" id="next-btn" class="btn btn-primary">次へ</button>
                    <button type="submit" id="submit-btn" class="btn btn-primary hidden">送信する</button>
                </div>
            </form>
        </main>

        <footer class="app-footer">
            <p>&copy; 2024 Your Pharmacy</p>
        </footer>
    </div>

    <!-- LIFF SDK -->
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="app.js"></script>
</body>
</html>
