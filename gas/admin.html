<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>問診回答管理</title>
  <style>
    :root {
      --line-green: #06C755;
      --bg-color: #f3f4f6;
      --text-main: #1f2937;
      --text-muted: #9ca3af;
      --border-color: #e5e7eb;
      --danger-bg: #fee2e2;
      --danger-text: #ef4444;
      --warning-bg: #fef3c7;
      --warning-text: #d97706;
      --card-bg: #ffffff;
    }
    body {
      font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif;
      background: var(--bg-color);
      padding: 20px;
      margin: 0;
      color: var(--text-main);
    }
    h2 { font-size: 1.5rem; color: #111827; margin-bottom: 1.5rem; text-align: center; }
    .card {
      background: var(--card-bg);
      padding: 24px;
      border-radius: 16px;
      margin-bottom: 24px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
      border: 1px solid #f9fafb;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    .card.visible { opacity: 1; transform: none; }
    .header {
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 16px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }
    .name { font-size: 1.35rem; font-weight: 700; color: #111827; display: flex; align-items: baseline; gap: 8px;}
    .name-sub { font-size: 0.85rem; color: #6b7280; font-weight: 500; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn {
      border: none;
      padding: 10px 18px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn-primary { background: #F47B20; color: white; }
    .btn-primary:hover { background: #d96918; }
    .btn-secondary { background: #0066cc; color: white; }
    .btn-secondary:hover { background: #0052a3; }
    .btn-retry { background: #06C755; color: white; padding: 12px 24px; font-size: 1rem; margin-top: 12px; }
    .btn:active { transform: scale(0.97); }
    .data-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }
    .data-item {
      background: #fdfdfd;
      border: 1px solid #f3f4f6;
      border-radius: 12px;
      padding: 16px;
      border-left: 4px solid #d1d5db;
    }
    .label { font-size: 1.1rem; color: #111827; display: block; margin-bottom: 8px; font-weight: 700; }
    .val { font-weight: 500; color: var(--text-main); line-height: 1.6; font-size: 0.95rem; }
    .text-muted { color: var(--text-muted); font-weight: 400; font-size: 0.9rem; }
    .time { font-size: 0.8rem; color: #9ca3af; margin-bottom: 20px; display: inline-flex; align-items: center; gap: 4px; }
    .time::before { content: "🕒"; font-size: 0.85rem; }

    /* スケルトンUI */
    .skeleton-wrap { display: flex; flex-direction: column; gap: 24px; }
    .skeleton-card { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
    .skeleton-line {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
      height: 16px;
      margin-bottom: 12px;
    }
    .skeleton-line.wide { width: 60%; }
    .skeleton-line.medium { width: 40%; }
    .skeleton-line.narrow { width: 25%; height: 12px; }
    .skeleton-line.header-line { width: 45%; height: 22px; }
    .skeleton-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; margin-top: 16px; }
    .skeleton-block { background: #f9fafb; border-radius: 12px; padding: 16px; border: 1px solid #f0f0f0; }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    /* ローディング */
    #loading-status { text-align: center; padding: 12px; font-size: 0.9rem; color: #6b7280; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .spinner { width: 18px; height: 18px; border: 2px solid #e5e7eb; border-top-color: #06C755; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #count-badge { display: inline-block; background: #06C755; color: white; font-size: 0.85rem; font-weight: 700; padding: 2px 12px; border-radius: 999px; margin-left: 8px; vertical-align: middle; }
    #error-box { display: none; background: #fee2e2; border: 1px solid #fecaca; border-radius: 12px; padding: 20px; text-align: center; color: #ef4444; margin-bottom: 16px; }
    #error-box p { margin: 0 0 8px; font-weight: 600; }
    #msg { padding: 20px; text-align: center; color: var(--text-muted); font-size: 1.1rem; display: none; }
  </style>
</head>
<body>
  <div style="max-width: 900px; margin: 0 auto;">
    <h2 style="padding: 10px 0;">問診回答一覧<span id="count-badge" style="display:none;"></span></h2>
    <div id="loading-status">
      <span class="spinner"></span>
      <span id="loading-text">データを取得しています...</span>
    </div>
    <div id="error-box">
      <p id="error-msg">データの取得に失敗しました。</p>
      <button class="btn btn-retry" onclick="loadData()">↺ 再試行</button>
    </div>
    <div id="skeleton" class="skeleton-wrap">
      <div class="skeleton-card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
          <div><div class="skeleton-line header-line"></div><div class="skeleton-line narrow"></div></div>
          <div style="display:flex; gap:10px;"><div class="skeleton-line" style="width:90px;height:36px;border-radius:999px;margin:0;"></div><div class="skeleton-line" style="width:90px;height:36px;border-radius:999px;margin:0;"></div></div>
        </div>
        <div class="skeleton-grid">
          <div class="skeleton-block"><div class="skeleton-line wide"></div><div class="skeleton-line medium"></div></div>
          <div class="skeleton-block"><div class="skeleton-line wide"></div><div class="skeleton-line medium"></div></div>
          <div class="skeleton-block"><div class="skeleton-line wide"></div><div class="skeleton-line medium"></div></div>
          <div class="skeleton-block"><div class="skeleton-line wide"></div><div class="skeleton-line medium"></div></div>
        </div>
      </div>
      <div class="skeleton-card" style="opacity:0.6;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
          <div><div class="skeleton-line header-line"></div><div class="skeleton-line narrow"></div></div>
          <div style="display:flex; gap:10px;"><div class="skeleton-line" style="width:90px;height:36px;border-radius:999px;margin:0;"></div><div class="skeleton-line" style="width:90px;height:36px;border-radius:999px;margin:0;"></div></div>
        </div>
        <div class="skeleton-grid">
          <div class="skeleton-block"><div class="skeleton-line wide"></div><div class="skeleton-line medium"></div></div>
          <div class="skeleton-block"><div class="skeleton-line wide"></div><div class="skeleton-line medium"></div></div>
        </div>
      </div>
    </div>
    <div id="msg"></div>
    <div id="container"></div>
  </div>

  <script>
    let listData = [];

    function loadData() {
      document.getElementById('error-box').style.display = 'none';
      document.getElementById('skeleton').style.display = 'flex';
      document.getElementById('loading-status').style.display = 'flex';
      document.getElementById('container').innerHTML = '';
      document.getElementById('msg').style.display = 'none';

      google.script.run
        .withSuccessHandler(handleResponse)
        .withFailureHandler(handleError)
        .getSubmissions();
    }

    function handleResponse(res) {
      document.getElementById('skeleton').style.display = 'none';
      document.getElementById('loading-status').style.display = 'none';

      if (res && res.success) {
        listData = res.list;
        const count = res.list.length;
        if (count === 0) {
          const msg = document.getElementById('msg');
          msg.style.display = 'block';
          msg.textContent = 'データがありません。';
          return;
        }
        const badge = document.getElementById('count-badge');
        badge.textContent = count + '件';
        badge.style.display = 'inline-block';
        renderBatch(0, 5);
      } else {
        showError('エラー: ' + (res ? res.error : '不明なエラー'));
      }
    }

    function handleError(err) {
      document.getElementById('skeleton').style.display = 'none';
      document.getElementById('loading-status').style.display = 'none';
      showError('通信エラー: ' + (err.message || err));
    }

    function showError(msg) {
      document.getElementById('error-msg').textContent = msg;
      document.getElementById('error-box').style.display = 'block';
    }

    function renderBatch(start, end) {
      const container = document.getElementById('container');
      const fragment = document.createDocumentFragment();
      const MUTED_SET = new Set(['なし', 'none', '', 'no', 'なし/飲まない', '該当なし', 'なし/しない', '飲まない']);
      const isMuted = (val) => !val || MUTED_SET.has(val);
      const isHl = (val) => !isMuted(val);
      const formatTel = (tel) => { if (!tel) return '不明'; const d = tel.replace(/[^0-9]/g, ''); if (d.match(/^(090|080|070|050)/)) return d.replace(/^(\d{3})(\d{4})(\d{4})$/, '$1-$2-$3'); if (d.match(/^0\d/)) return d.replace(/^(\d{2,4})(\d{2,4})(\d{4})$/, '$1-$2-$3'); return tel; };
      const highlight = (val) => {
        if (isMuted(val)) return `<span class="text-muted">${val || 'なし'}</span>`;
        if (val === 'yes') return `<span style="color:#06C755; font-weight:700;">あり</span>`;
        return `<span style="color:#06C755; font-weight:700;">${val}</span>`;
      };
      const mkLabel = (text) => `<span class="label">${text}</span>`;
      const formatKV = (lbl, val) => `<span style="color:${isHl(val)?'#06C755':'#9ca3af'}; font-weight:${isHl(val)?'700':'400'}; margin-right:4px;">${lbl}:</span> ${highlight(val)}`;

      const actualEnd = Math.min(end, listData.length);
      for (let i = start; i < actualEnd; i++) {
        const item = listData[i];
        const hasWarning = (
          item['薬アレルギー'] === 'あり' || item['食品アレルギー'] === 'あり' ||
          (item['環境アレルギー'] && item['環境アレルギー'] !== 'なし' && item['環境アレルギー'] !== '') ||
          item['副作用'] === 'あり'
        );
        const div = document.createElement('div');
        div.className = 'card';
        if (hasWarning) div.style.borderLeft = '6px solid var(--danger-text)';
        div.innerHTML = `
          <div class="header">
            <div class="name">
              ${item['名前'] || '名前なし'} <span style="font-size:1rem; color:#6b7280; font-weight:normal;">様</span>
              <span class="name-sub">TEL: ${formatTel(item['電話番号'])}</span>
            </div>
            <div class="actions">
              <button class="btn btn-primary" onclick="copyText(${i},this)">MEDIXS用</button>
              <button class="btn btn-secondary" onclick="copyText(${i},this,true)">調剤くん用</button>
            </div>
          </div>
          <div class="time">受信: ${item['日時'] || ''}</div>
          <div class="data-grid">
            <div class="data-item">${mkLabel('患者様の状態')}<span class="val">${(() => { const s = item['状態']; if (!s || s === 'none' || s === 'なし/飲まない' || s === 'なし/しない' || s === 'なし') return '<span class="text-muted">該当なし</span>'; if (s === 'pregnant' || s === '妊娠中(可能性あり)' || s === '妊娠中') return '<span style="color:#06C755; font-weight:700;">妊娠中(可能性あり)</span>'; if (s === 'breastfeeding' || s === '授乳中') return '<span style="color:#06C755; font-weight:700;">授乳中</span>'; if (s === 'pediatric' || s === '小児(15歳未満)' || s === '小児') return '<span style="color:#06C755; font-weight:700;">小児(15歳未満)</span>'; return highlight(s); })()}</span>${item['妊婦体重'] ? `<div style="font-size:0.8rem;color:#6b7280;margin-top:4px;">(体重: ${item['妊婦体重']}kg)</div>` : ''}${item['授乳婦体重'] ? `<div style="font-size:0.8rem;color:#6b7280;margin-top:4px;">(体重: ${item['授乳婦体重']}kg)</div>` : ''}${item['小児体重'] ? `<div style="font-size:0.8rem;color:#6b7280;margin-top:4px;">(体重: ${item['小児体重']}kg)</div>` : ''}</div>
            <div class="data-item">${mkLabel('後発品変更希望')}<span class="val">${(() => { const g = item['ジェネリック']; if (!g || g === 'なし') return '<span class="text-muted">なし</span>'; if (g === 'prefer') return '<span style="color:#06C755;font-weight:700;">ジェネリックで大丈夫</span>'; if (g === 'ag') return '<span style="color:#06C755;font-weight:700;">オーソライズド・ジェネリック希望</span>'; if (g === 'avoid') return '<span style="color:#06C755;font-weight:700;">先発医薬品を希望する</span>'; return g; })()}</span></div>
            <div class="data-item">${mkLabel('手帳活用の有無')}<span class="val">${!item['お薬手帳'] || item['お薬手帳'] === 'なし' ? '<span class="text-muted">なし</span>' : `<span style="color:#06C755;font-weight:700;">${item['お薬手帳']}</span>`}</span></div>
            <div class="data-item">${mkLabel('既往歴')}<span class="val">${highlight(item['既往歴'])}</span>${item['既往歴詳細'] ? `<div style="font-size:0.8rem;color:#6b7280;margin-top:4px;">(詳: ${item['既往歴詳細']})</div>` : ''}</div>
            <div class="data-item">${mkLabel('花粉症・アレルゲン')}<span class="val">${highlight(item['環境アレルギー'])}</span></div>
            <div class="data-item">${mkLabel('副作用歴、薬物アレルギー')}<span class="val">${item['副作用'] && item['副作用'] !== 'なし' ? formatKV('副作用', item['副作用']) + '<br>' : ''}${formatKV('薬物アレルギー', item['薬アレルギー'])}</span>${item['副作用詳細'] ? `<div style="font-size:0.8rem;color:#6b7280;margin-top:4px;">(副作用詳細: ${item['副作用詳細']})</div>` : ''}${item['アレルギー詳細'] ? `<div style="font-size:0.8rem;color:#6b7280;margin-top:4px;">(詳細: ${item['アレルギー詳細']})</div>` : ''}</div>
            <div class="data-item">${mkLabel('食物等アレルギー')}<span class="val">${highlight(item['食品アレルギー'])}</span>${item['食品詳細'] ? `<div style="font-size:0.8rem;color:#6b7280;margin-top:4px;">(食物詳細: ${item['食品詳細']})</div>` : ''}</div>
            <div class="data-item">${mkLabel('定期的服用薬・OTC')}<span class="val">${formatKV('他院処方', item['他院処方'])}<br>${formatKV('市販薬･サプリ', item['市販薬'])}</span>${item['他院詳細'] ? `<div style="font-size:0.8rem;color:#6b7280;margin-top:4px;">(他院処方詳細: ${item['他院詳細']})</div>` : ''}${item['市販薬詳細'] ? `<div style="font-size:0.8rem;color:#6b7280;margin-top:4px;">(市販薬詳細: ${item['市販薬詳細']})</div>` : ''}</div>
            <div class="data-item">${mkLabel('飲食物の摂取状況等')}<span class="val">${formatKV('酒', item['酒'])}<br>${formatKV('飲食物', item['飲食物'])}</span>${item['飲食物詳細'] ? `<div style="font-size:0.8rem;color:#6b7280;margin-top:4px;">(飲食物詳細: ${item['飲食物詳細']})</div>` : ''}</div>
            <div class="data-item">${mkLabel('薬学的管理に必要な生活像')}<span class="val" style="line-height:2;">${formatKV('運転', item['運転'])}<br>${formatKV('高所作業', item['高所'])}<br>${formatKV('コンタクト', item['ソフトコンタクト'])}<br>${formatKV('喫煙', item['煙草'])}</span></div>
          </div>
          ${item['備考'] ? `<div class="data-item" style="margin-top:16px; border:1px solid #fde68a; border-left:4px solid #f59e0b; background:#fffbeb; padding:16px; border-radius:12px;"><span class="label" style="color:#b45309;">特記事項</span><span class="val" style="color:#b45309;font-weight:700;">${item['備考']}</span></div>` : ''}
        `;
        fragment.appendChild(div);
      }
      container.appendChild(fragment);
      requestAnimationFrame(() => {
        const newCards = container.querySelectorAll('.card:not(.visible)');
        newCards.forEach((card, idx) => { setTimeout(() => { card.classList.add('visible'); }, idx * 40); });
      });
      if (actualEnd < listData.length) {
        const renderNext = () => renderBatch(actualEnd, actualEnd + 10);
        if (typeof requestIdleCallback !== 'undefined') {
          requestIdleCallback(renderNext, { timeout: 500 });
        } else {
          setTimeout(renderNext, 100);
        }
      }
    }

    function copyText(idx, btn, isChozaiKun = false) {
      const item = listData[idx];
      const formatTel = (tel) => { if (!tel) return '不明'; const d = tel.replace(/[^0-9]/g, ''); if (d.match(/^(090|080|070|050)/)) return d.replace(/^(\d{3})(\d{4})(\d{4})$/, '$1-$2-$3'); if (d.match(/^0\d/)) return d.replace(/^(\d{2,4})(\d{2,4})(\d{4})$/, '$1-$2-$3'); return tel; };
      let text = isChozaiKun ? "" : "【初回問診引用】\n";
      if (isChozaiKun) text += `■電話番号: ${formatTel(item['電話番号'])}\n`;
      const formatVal = (val) => {
        if (!val || val === 'なし/しない' || val === 'なし/飲まない' || val === '飲まない' || val === 'false' || val === 'none' || val === 'no') return 'なし';
        if (val === 'yes') return 'あり';
        return val;
      };
      const getDetail = (val, detail) => { let v = formatVal(val); return (v !== 'なし' && detail) ? `${v} (${detail})` : v; };
      const formatCondition = (val) => {
        if (!val || val === 'none' || val === 'なし/飲まない' || val === 'なし/しない' || val === 'なし') return '該当なし';
        if (val === 'pregnant' || val === '妊娠中(可能性あり)') return '妊娠中(可能性あり)';
        if (val === 'breastfeeding' || val === '授乳中') return '授乳中';
        if (val === 'pediatric' || val === '小児(15歳未満)') return '小児(15歳未満)';
        return val;
      };
      const formatGeneric = (val) => {
        if (!val) return 'なし';
        if (val === 'prefer') return 'ジェネリックで大丈夫';
        if (val === 'ag') return 'オーソライズド・ジェネリックでなら希望';
        if (val === 'avoid') return '先発医薬品を希望する';
        return val;
      };
      text += `■患者様の状態: ${formatCondition(item['状態'])}\n`;
      if (item['妊婦体重']) text += `  └ 体重: ${item['妊婦体重']}kg\n`;
      if (item['授乳婦体重']) text += `  └ 体重: ${item['授乳婦体重']}kg\n`;
      if (item['小児体重']) text += `  └ 体重: ${item['小児体重']}kg\n`;
      text += `■後発品変更希望: ${formatGeneric(item['ジェネリック'])}\n`;
      text += `■手帳活用の有無: ${formatVal(item['お薬手帳'])}\n`;
      text += `■既往歴: ${getDetail(item['既往歴'], item['既往歴詳細'])}\n`;
      text += `■花粉症・アレルゲンについて: ${formatVal(item['環境アレルギー'])}\n`;
      const sideEffectStr = item['副作用'] && item['副作用'] !== 'なし' ? ` 副作用:${getDetail(item['副作用'], item['副作用詳細'])} /` : '';
      text += `■副作用歴、薬物アレルギー:${sideEffectStr} 薬・副作用等:${getDetail(item['薬アレルギー'], item['アレルギー詳細'])}\n`;
      text += `■食物等アレルギー: ${getDetail(item['食品アレルギー'], item['食品詳細'])}\n`;
      text += `■定期的服用薬・サプリメント・OTC: 他院処方:${getDetail(item['他院処方'], item['他院詳細'])} / 市販薬･サプリ:${getDetail(item['市販薬'], item['市販薬詳細'])}\n`;
      text += `■飲食物の摂取状況等: 酒:${formatVal(item['酒'])} / 飲食物:${getDetail(item['飲食物'], item['飲食物詳細'])}\n`;
      text += `■薬学的管理に必要な患者の生活像: 妊娠・授乳・小児:${formatCondition(item['状態'])} / 運転:${formatVal(item['運転'])} / 高所作業:${formatVal(item['高所'])} / コンタクト:${formatVal(item['ソフトコンタクト'])} / 喫煙:${formatVal(item['煙草'])}\n`;
      if (item['備考']) text += `■特記事項: ${item['備考']}\n`;

      const doFallback = () => {
        const el = document.createElement('textarea');
        el.value = text; el.style.position = 'fixed'; el.style.left = '-9999px';
        document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
        const old = btn.innerText; btn.innerText = 'コピー完了！'; setTimeout(() => { btn.innerText = old; }, 1500);
      };
      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => {
          const old = btn.innerText; btn.innerText = 'コピー完了！'; setTimeout(() => { btn.innerText = old; }, 1500);
        }).catch(doFallback);
      } else { doFallback(); }
    }

    // ページロードと同時にデータ取得開始
    loadData();
  </script>
</body>
</html>
