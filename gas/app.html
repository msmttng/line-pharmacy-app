<script>
// --- Configuration ---
const LIFF_ID = 'YOUR_LIFF_ID'; 

// --- State ---
let currentStep = 1;
const totalSteps = 7;
const formData = {};

// --- LIFF Initialization ---
async function initializeLiff() {
    try {
        await liff.init({ liffId: LIFF_ID });
    } catch (err) {
        console.warn('LIFF Initialization failed.', err);
    }
}

// --- Navigation Logic ---
function updateNavigation() {
    const progress = (currentStep / totalSteps) * 100;
    document.getElementById('progress-bar').style.width = `${progress}%`;

    document.querySelectorAll('.form-step').forEach(step => {
        step.classList.remove('active');
        if (parseInt(step.dataset.step) === currentStep) {
            step.classList.add('active');
        }
    });

    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const submitBtn = document.getElementById('submit-btn');

    if (currentStep === 1) {
        prevBtn.classList.add('hidden');
    } else {
        prevBtn.classList.remove('hidden');
    }

    if (currentStep === totalSteps) {
        nextBtn.classList.add('hidden');
        submitBtn.classList.remove('hidden');
        generateConfirmation();
    } else {
        nextBtn.classList.remove('hidden');
        submitBtn.classList.add('hidden');
    }
    window.scrollTo(0, 0);
    document.body.scrollTop = 0;
    document.documentElement.scrollTop = 0;
    setTimeout(() => {
        window.scrollTo(0, 0);
    }, 50);
}

function handleNext() {
    if (validateStep(currentStep)) {
        saveStepData(currentStep);
        if (currentStep < totalSteps) {
            currentStep++;
            updateNavigation();
        }
    }
}

function handlePrev() {
    if (currentStep > 1) {
        currentStep--;
        updateNavigation();
    }
}

function validateStep(step) {
    const activeSection = document.querySelector(`.form-step[data-step="${step}"]`);
    const requiredInputs = activeSection.querySelectorAll('[required]');
    let isValid = true;

    requiredInputs.forEach(input => {
        if (input.type === 'radio') {
            const name = input.name;
            const checked = activeSection.querySelector(`input[name="${name}"]:checked`);
            if (!checked) {
                isValid = false;
            }
        } else if (!input.value.trim()) {
            isValid = false;
        }
    });

    if (!isValid) alert('必須項目を入力してください。');
    return isValid;
}

function saveStepData(step) {
    const activeSection = document.querySelector(`.form-step[data-step="${step}"]`);
    const inputs = activeSection.querySelectorAll('input, select, textarea');
    
    inputs.forEach(input => {
        if (input.type === 'radio') {
            if (input.checked) formData[input.name] = input.value;
        } else if (input.type === 'checkbox') {
            const checkedBoxes = activeSection.querySelectorAll(`input[name="${input.name}"]:checked`);
            formData[input.name] = Array.from(checkedBoxes).map(cb => cb.value);
        } else {
            formData[input.name] = input.value;
        }
    });
}

// --- Confirmation Page ---
function generateConfirmation() {
    const view = document.getElementById('confirmation-view');
    const labels = {
        'name': 'お名前',
        'phone': '電話番号',
        'booklet': 'お薬手帳',
        'patient-condition': '患者様の状態',
        'weight': '体重',
        'drug-allergy': 'アレルギー・副作用歴',
        'food-allergy': '食物アレルギー',
        'env-allergy': '環境・季節性アレルギー',
        'current-presc': '服用中のお薬',
        'otc-list': '使用中の市販薬・サプリ',
        'food-drink': '日常的な飲食物',
        'history': '既往歴',
        'driving': '運転の有無',
        'height-work': '高所作業の有無',
        'soft-contact': 'ソフトコンタクト',
        'generic': 'ジェネリック希望'
    };

    const otcLabels = {
        'cold': '風邪薬', 'pain': '痛み止め', 'rhinitis': '鼻炎薬', 'stomach': '胃腸薬',
        'constipation': '便秘薬', 'kanpo': '漢方薬', 'eye': '目薬', 'vitamin': 'ビタミン',
        'multi-mineral': 'マルチミネラル', 'iron': '鉄', 'zinc': '亜鉛', 'calcium': 'カルシウム', 'magnesium': 'マグネシウム',
        'dha-epa': 'DHA/EPA', 'protein': 'プロテイン', 'other': 'その他'
    };
    
    const foodDrinkLabels = {
        'coffee-tea': 'コーヒー・紅茶', 'grapefruit': 'グレープフルーツジュース', 
        'dairy': '乳製品', 'other': 'その他'
    };
    
    const envLabels = {
        'hayfever': '花粉症', 'housedust': 'ハウスダスト', 'mite': 'ダニ',
        'dog-cat': '犬・猫', 'temp': '寒暖差', 'perennial': '通年性', 'testing': 'アレルギーの検査中', 'other': 'その他'
    };
    
    const historyLabels = {
        'hypertension': '高血圧', 'diabetes': '糖尿病', 'heart': '心臓病', 
        'kidney': '腎臓病', 'liver': '肝臓病', 'asthma': '喘息', 
        'epilepsy': 'てんかん', 'glaucoma': '緑内障', 'prostate': '前立腺肥大',
        'other': 'その他'
    };

    
    const hayfeverTypeLabels = {
        'sugi': 'スギ', 'hinoki': 'ヒノキ', 'ine': 'イネ', 'butakusa': 'ブタクサ', 'kamogaya': 'カモガヤ'
    };
    
    const conditionLabels = {
        'none': '該当なし', 'pregnant': '妊娠中(可能性あり)', 
        'breastfeeding': '授乳中', 'pediatric': '小児(15歳未満)'
    };

    // Prepare data for LINE message
    let bookletStr = '';
    if (formData.booklet === 'yes') {
        bookletStr = `\nお薬手帳: あり${formData['booklet-type'] ? `（${formData['booklet-type'] === 'paper' ? '紙' : '電子'}）` : ''}`;
    } else if (formData.booklet === 'no') {
        bookletStr = '\nお薬手帳: なし';
    }

    let condStr = '';
    if (formData['patient-condition'] && formData['patient-condition'] !== 'none') {
        condStr = `\n患者様の状態: ${conditionLabels[formData['patient-condition']] || formData['patient-condition']}`;
        if (formData.weight) {
            condStr += ` (${formData.weight} kg)`;
        }
    } else if (formData['patient-condition'] === 'none') {
        condStr = '\n患者様の状態: 該当なし';
    }

    const message = `【初回問診票回答】\n氏名: ${formData.name}\n電話: ${formData.phone}${bookletStr}${condStr}\n薬アレルギー・副作用: ${formData['drug-allergy']}\n運転: ${formData.driving}\n高所作業: ${formData['height-work']}\nジェネリック: ${formData.generic}`;
    
    let html = '';
    for (let key in labels) {
        if (formData[key] !== undefined && formData[key] !== '') {
            let value = formData[key];
            if (Array.isArray(value)) {
                if (key === 'otc-list') value = value.map(v => otcLabels[v] || v).join(', ');
                else if (key === 'env-allergy') {
                    let allergies = value.map(v => envLabels[v] || v);
                    if (value.includes('hayfever') && formData['hayfever-type'] && formData['hayfever-type'].length > 0) {
                        const types = formData['hayfever-type'].map(t => hayfeverTypeLabels[t] || t).join('・');
                        allergies = allergies.map(a => a === '花粉症' ? `花粉症(${types})` : a);
                    }
                    value = allergies.join(', ');
                }
                else if (key === 'food-drink') value = value.map(v => foodDrinkLabels[v] || v).join(', ');
                else if (key === 'history') value = value.map(v => historyLabels[v] || v).join(', ');
                else value = value.join(', ');
            }
            if (key === 'weight') value += ' kg';
            if (key === 'patient-condition') value = conditionLabels[value] || value;
            if (key === 'booklet') {
                if (value === 'yes') {
                    value = 'あり' + (formData['booklet-type'] ? `（${formData['booklet-type'] === 'paper' ? '紙' : '電子'}）` : '');
                } else if (value === 'no') {
                    value = 'なし';
                }
            } else {
                if (value === 'yes') value = 'あり/する';
                if (value === 'no') value = 'なし';
                if (value === 'prefer') value = 'ジェネリック希望';
                if (value === 'avoid') value = '先発希望';
                if (value === 'ag') value = '先発（AGなら希望）';
            }
            
            if (value) {
                html += `<div class="conf-item">
                    <span class="conf-label">${labels[key]}</span>
                    <span class="conf-value">${value}</span>
                </div>`;
            }
        }
    }
    view.innerHTML = html;
}

// --- Submission ---
async function handleSubmit(e) {
    e.preventDefault();
    if (!document.getElementById('agree').checked) {
        alert('個人情報の取り扱いに同意してください。');
        return;
    }

    const submitBtn = document.getElementById('submit-btn');
    submitBtn.disabled = true;
    submitBtn.innerText = '送信中...';

    formData.source = 'webapp';

    google.script.run
        .withSuccessHandler(function(response) {
            if (response.success) {
                showSuccess();
            } else {
                alert('送信に失敗しました: ' + response.error);
                submitBtn.disabled = false;
                submitBtn.innerText = '送信する';
            }
        })
        .withFailureHandler(function(err) {
            alert('通信エラーが発生しました。');
            submitBtn.disabled = false;
            submitBtn.innerText = '送信する';
        })
        .submitToSpreadsheet(formData);
}

function showSuccess() {
    document.querySelector('.form-container').innerHTML = `
        <div class="success-view">
            <div class="success-icon">✓</div>
            <h2>送信完了しました</h2>
            <p>ご協力ありがとうございました。<br>窓口のスタッフにお声がけください。</p>
            <button class="btn btn-primary" onclick="closeLiff()" style="margin-top:30px;">画面を閉じる</button>
        </div>
    `;
    document.querySelector('.app-header').style.display = 'none';
    document.querySelector('.form-nav').style.display = 'none';
}

function closeLiff() {
    console.log('Close button clicked');
    
    let isLiff = false;
    try {
        if (typeof liff !== 'undefined' && liff.isInClient()) {
            isLiff = true;
            liff.closeWindow(); // LINEアプリ内なら閉じる
        }
    } catch (e) {
        console.warn('LIFF close failed:', e);
    }

    if (!isLiff) {
        // ブラウザの場合：自身のスマホかタブレットかに応じてメッセージを汎用的にする
        document.querySelector('.success-view').innerHTML = `
            <div class="success-icon" style="color: #06C755; font-size: 80px; margin-bottom: 20px;">✓</div>
            <h2 style="font-size: 1.5rem; color: #333; margin-bottom: 15px;">ご回答<br>ありがとうございました</h2>
            <p style="font-size: 1.1rem; color: #555; line-height: 1.6;">手続きが完了しました。<br><br><b>このブラウザの画面（タブ）を閉じてください。</b><br><span style="font-size: 0.9rem;">※ 薬局のタブレットをご利用の方は、そのままスタッフにお渡しください。</span></p>
        `;
    }
}

document.getElementById('next-btn').addEventListener('click', handleNext);
document.getElementById('prev-btn').addEventListener('click', handlePrev);
document.getElementById('questionnaire-form').addEventListener('submit', handleSubmit);

document.querySelectorAll('input[type="radio"]').forEach(radio => {
    radio.addEventListener('change', (e) => {
        const detailInput = e.target.closest('.input-group').querySelector('.sub-input');
        if (detailInput) {
            if (['yes', 'other'].includes(e.target.value)) detailInput.classList.remove('hidden');
            else if (e.target.value === 'no') detailInput.classList.add('hidden');
        }
        
        // Handle patient condition weight input toggle
        if (e.target.name === 'patient-condition') {
            const weightInputGroup = document.getElementById('weight-input-group');
            const weightInput = document.getElementById('weight');
            if (e.target.value === 'pediatric') {
                weightInputGroup.classList.remove('hidden');
                weightInput.setAttribute('required', 'true');
            } else {
                weightInputGroup.classList.add('hidden');
                weightInput.removeAttribute('required');
                weightInput.value = ''; // clear value
            }
        }

        // Handle booklet type input toggle
        if (e.target.name === 'booklet') {
            const bookletTypeGroup = document.getElementById('booklet-type-group');
            const typeInputs = bookletTypeGroup.querySelectorAll('input[type="radio"]');
            if (e.target.value === 'yes') {
                bookletTypeGroup.classList.remove('hidden');
                typeInputs.forEach(input => input.setAttribute('required', 'true'));
            } else {
                bookletTypeGroup.classList.add('hidden');
                typeInputs.forEach(input => {
                    input.removeAttribute('required');
                    input.checked = false; // clear checking
                });
            }
        }
    });
});


document.querySelectorAll('input[type="checkbox"]').forEach(checkbox => {
    checkbox.addEventListener('change', (e) => {
        if (e.target.id === 'hayfever-toggle') {
            const subgroup = document.getElementById('hayfever-subgroup');
            const typeInputs = subgroup.querySelectorAll('input[type="checkbox"]');
            if (e.target.checked) {
                subgroup.classList.remove('hidden');
            } else {
                subgroup.classList.add('hidden');
                typeInputs.forEach(input => input.checked = false);
            }
        }
    });
});

initializeLiff();
updateNavigation();
</script>
