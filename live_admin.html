<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>問診回答管理</title>
  <style>
    :root { --line-green: #06C755; --bg-color: #f0f2f5; }
    body { font-family: sans-serif; background: var(--bg-color); padding: 15px; margin: 0; color: #333; }
    .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .header { font-weight: bold; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    .name { font-size: 1.2rem; color: #1a1a1a; }
    .btn { background: var(--line-green); color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }
    .btn:active { opacity: 0.8; transform: scale(0.98); }
    #msg { padding: 15px; text-align: center; color: #666; font-size: 0.9rem; }
    .data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; font-size: 0.85rem; }
    .data-item { border-left: 3px solid #eee; padding-left: 8px; }
    .label { font-size: 0.7rem; color: #888; display: block; }
    .val { font-weight: 600; }
    .alert { color: #ff4d4f; }
  </style>
</head>
<body>
  <div style="max-width: 900px; margin: 0 auto;">
    <h2 style="padding: 10px 0;">問診回答一覧</h2>
    <div id="msg">データを読み込んでいます...</div>
    <div id="container"></div>
  </div>

  <script>
    let listData = [];
    const API_URL = "https://script.google.com/macros/s/AKfycbwzgWaaqg6HyDTh8Qxq2_TdTqwH0q_INm_kuArmq640Xqai0KXp_xWbGJhhIs00b41wpQ/exec?action=get";

    // 画面の描画を待たずに、スクリプトが読み込まれた瞬間にデータ取得を開始する（通信の前倒し）
    const fetchPromise = fetch(API_URL).then(response => response.json());

    window.onload = function() {
      fetchPromise
        .then(function(res) {
          const msg = document.getElementById("msg");
          if (res && res.success) {
            listData = res.list;
            msg.innerText = res.list.length + " 件の回答があります";
            render();
          } else {
            msg.innerText = "エラー: " + (res ? res.error : "不明なエラー");
          }
        })
        .catch(function(err) {
          document.getElementById("msg").innerText = "通信エラー: " + err.message;
        });
    };

    function render() {
      const container = document.getElementById('container');
      if (listData.length === 0) {
        container.innerHTML = '<div id="msg">データがありません。</div>';
        return;
      }

      const highlight = (val) => {
        if (!val) return 'なし';
        if (typeof val === 'string' && (val.includes('あり') || val.includes('毎日') || val.includes('時々') || val !== 'なし' && val !== 'なし/飲まない' && val !== '' && !val.includes('なし'))) {
           // なし 以外の具体的な文字が入っている場合は強調（赤色・太字）にする
           return `<span style="color:#ff4d4f; font-weight:bold;">${val}</span>`;
        }
        return val;
      };

      container.innerHTML = listData.map((item, i) => {
        const hasWarning = (
          item['薬アレルギー'] === 'あり' || 
          item['食品アレルギー'] === 'あり' || 
          (item['環境アレルギー'] && item['環境アレルギー'] !== 'なし' && item['環境アレルギー'] !== '') ||
          item['副作用'] === 'あり'
        );
        
        return `
          <div class="card" style="${hasWarning ? 'border-left: 6px solid #ff4d4f;' : ''}">
            <div class="header">
              <div class="name">
                ${item['名前'] || '名前なし'} 様
                <span style="font-size:0.8rem; color:#666; font-weight:normal; margin-left:10px;">TEL: ${item['電話番号'] || '不明'}</span>
              </div>
              <button class="btn" onclick="copy(${i}, this)">薬歴用にコピー</button>
            </div>
            <div style="font-size:0.75rem; color:#888; margin-bottom:15px;">受信: ${item['日時'] || ''}</div>
            
            <div class="data-grid">
              <div class="data-item">
                <span class="label">患者様の状態</span>
                <span class="val">${highlight(item['状態'])}</span>
                ${item['妊婦体重'] ? `<div style="font-size:0.75rem; color:#555; margin-top:2px;">(体重: ${item['妊婦体重']}kg)</div>` : ''}
                ${item['授乳婦体重'] ? `<div style="font-size:0.75rem; color:#555; margin-top:2px;">(体重: ${item['授乳婦体重']}kg)</div>` : ''}
                ${item['小児体重'] ? `<div style="font-size:0.75rem; color:#555; margin-top:2px;">(体重: ${item['小児体重']}kg)</div>` : ''}
              </div>
              <div class="data-item">
                <span class="label">後発品変更希望</span>
                <span class="val" style="color:#06C755;">${item['ジェネリック'] || 'なし'}</span>
              </div>
              <div class="data-item">
                <span class="label">手帳活用の有無</span>
                <span class="val" style="color:#06C755; font-weight:bold;">${item['お薬手帳'] || 'なし'}</span>
              </div>
              <div class="data-item">
                <span class="label">既往歴</span>
                <span class="val">${highlight(item['既往歴'])}</span>
                ${item['既往歴詳細'] ? `<div style="font-size:0.75rem; color:#555; margin-top:2px;">(詳: ${item['既往歴詳細']})</div>` : ''}
              </div>
              <div class="data-item">
                <span class="label">花粉症・アレルゲンについて</span>
                <span class="val">${highlight(item['環境アレルギー'])}</span>
              </div>
              <div class="data-item">
                <span class="label">副作用歴、薬物アレルギー</span>
                <span class="val">${item['副作用'] && item['副作用'] !== 'なし' ? '副作用:' + highlight(item['副作用']) + '<br>' : ''}薬歴・副作用:${highlight(item['薬アレルギー'])}</span>
                ${item['副作用詳細'] ? `<div style="font-size:0.75rem; color:#555; margin-top:2px;">(副作用詳細: ${item['副作用詳細']})</div>` : ''}
                ${item['アレルギー詳細'] ? `<div style="font-size:0.75rem; color:#555; margin-top:2px;">(詳細: ${item['アレルギー詳細']})</div>` : ''}
              </div>
              <div class="data-item">
                <span class="label">食物等アレルギー</span>
                <span class="val">${highlight(item['食品アレルギー'])}</span>
                ${item['食品詳細'] ? `<div style="font-size:0.75rem; color:#555; margin-top:2px;">(食物詳細: ${item['食品詳細']})</div>` : ''}
              </div>
              <div class="data-item">
                <span class="label">定期的服用薬・サプリメント・OTC</span>
                <span class="val">他院処方:${highlight(item['他院処方'])}<br>市販薬･サプリ:${highlight(item['市販薬'])}</span>
                ${item['他院詳細'] ? `<div style="font-size:0.75rem; color:#555; margin-top:2px;">(他院処方詳細: ${item['他院詳細']})</div>` : ''}
                ${item['市販薬詳細'] ? `<div style="font-size:0.75rem; color:#555; margin-top:2px;">(市販薬詳細: ${item['市販薬詳細']})</div>` : ''}
              </div>
              <div class="data-item">
                <span class="label">飲食物の摂取状況等</span>
                <span class="val">酒:${highlight(item['酒'])}<br>飲食物:${highlight(item['飲食物'])}</span>
                ${item['飲食物詳細'] ? `<div style="font-size:0.75rem; color:#555; margin-top:2px;">(飲食物詳細: ${item['飲食物詳細']})</div>` : ''}
              </div>
              <div class="data-item">
                <span class="label">薬学的管理に必要な患者の生活像</span>
                <span class="val">妊娠・授乳・小児:${highlight(item['状態'])}<br>運転:${highlight(item['運転'])}<br>高所作業:${highlight(item['高所'])}<br>コンタクト:${highlight(item['ソフトコンタクト'])}<br>喫煙:${highlight(item['煙草'])}</span>
              </div>
            </div>
            ${item['備考'] ? `
            <div class="data-item" style="margin-top:10px; border-left: 3px solid #ffca28; background:#fffdf5; padding:8px;">
              <span class="label">特記事項</span>
              <span class="val">${item['備考']}</span>
            </div>` : ''}
          </div>
        `;
      }).join('');
    }

    function copy(idx, btn) {
      const item = listData[idx];
      let text = "【初回問診引用】\n";

      const formatVal = (val) => {
        if (!val || val === 'なし/しない' || val === 'なし/飲まない' || val === 'false') return 'なし';
        return val;
      };
      
      const getDetail = (val, detail) => {
        let v = formatVal(val);
        if (v !== 'なし' && detail) {
            return `${v} (${detail})`;
        }
        return v;
      };

      text += `■患者様の状態: ${formatVal(item['状態'])}\n`;
      if (item['妊婦体重']) text += `  └ 体重: ${item['妊婦体重']}kg\n`;
      if (item['授乳婦体重']) text += `  └ 体重: ${item['授乳婦体重']}kg\n`;
      if (item['小児体重']) text += `  └ 体重: ${item['小児体重']}kg\n`;
      text += `■後発品変更希望: ${formatVal(item['ジェネリック'])}\n`;
      text += `■手帳活用の有無: ${formatVal(item['お薬手帳'])}\n`;
      text += `■既往歴: ${getDetail(item['既往歴'], item['既往歴詳細'])}\n`;
      text += `■花粉症・アレルゲンについて: ${formatVal(item['環境アレルギー'])}\n`;
      const sideEffectStr = item['副作用'] && item['副作用'] !== 'なし' ? ` 副作用:${getDetail(item['副作用'], item['副作用詳細'])} /` : '';
      text += `■副作用歴、薬物アレルギー:${sideEffectStr} 薬・副作用等:${getDetail(item['薬アレルギー'], item['アレルギー詳細'])}\n`;
      text += `■食物等アレルギー: ${getDetail(item['食品アレルギー'], item['食品詳細'])}\n`;
      text += `■定期的服用薬・サプリメント・OTC: 他院処方:${getDetail(item['他院処方'], item['他院詳細'])} / 市販薬･サプリ:${getDetail(item['市販薬'], item['市販薬詳細'])}\n`;
      text += `■飲食物の摂取状況等: 酒:${formatVal(item['酒'])} / 飲食物:${getDetail(item['飲食物'], item['飲食物詳細'])}\n`;
      text += `■薬学的管理に必要な患者の生活像: 妊娠・授乳・小児:${formatVal(item['状態'])} / 運転:${formatVal(item['運転'])} / 高所作業:${formatVal(item['高所'])} / コンタクト:${formatVal(item['ソフトコンタクト'])} / 喫煙:${formatVal(item['煙草'])}\n`;
      if (item['備考']) {
        text += `■特記事項: ${item['備考']}\n`;
      }

      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => {
          const old = btn.innerText;
          btn.innerText = 'コピー完了！';
          setTimeout(() => { btn.innerText = old; }, 1500);
        }).catch(err => {
          console.error('Failed to copy: ', err);
          const el = document.createElement('textarea');
          el.value = text;
          el.style.position = 'fixed';
          el.style.left = '-9999px';
          document.body.appendChild(el); 
          el.select();
          document.execCommand('copy'); 
          document.body.removeChild(el);
          const old = btn.innerText;
          btn.innerText = 'コピー完了！';
          setTimeout(() => { btn.innerText = old; }, 1500);
        });
      } else {
        const el = document.createElement('textarea');
        el.value = text;
        el.style.position = 'fixed';
        el.style.left = '-9999px';
        document.body.appendChild(el); 
        el.select();
        document.execCommand('copy'); 
        document.body.removeChild(el);
        const old = btn.innerText;
        btn.innerText = 'コピー完了！';
        setTimeout(() => { btn.innerText = old; }, 1500);
      }
    }
  </script>
</body>
</html>
